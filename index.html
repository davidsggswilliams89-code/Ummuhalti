<!DOCTYPE html>
<html>
<head>
  <title>Ummuhalti Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    .header {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111;
      color: white;
      padding: 12px 15px;
      z-index: 1000;
    }

    .header a {
      color: white;
      margin-left: 10px;
      text-decoration: none;
      cursor: pointer;
    }

    .hero {
      text-align: center;
      padding: 100px 20px 20px;
      background: white;
    }

    /* FILTER */
    .filter-box {
      text-align: center;
      padding: 10px;
    }

    select {
      padding: 8px;
      width: 60%;
    }

    /* CAROUSEL */
    .carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 15px;
      padding: 10px;
    }

    .carousel::-webkit-scrollbar {
      display: none;
    }

    .card {
      flex: 0 0 85%;
      scroll-snap-align: center;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .img-box img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      background: rgba(0,0,0,0.7);
      color: white;
      text-align: center;
      padding: 5px;
      border-radius: 5px;
    }

    .buy-btn {
      background: #25D366;
      color: white;
      padding: 10px;
      border: none;
      width: 100%;
      margin-top: 5px;
      border-radius: 5px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .buy-btn img {
      width: 18px;
    }

    .dots {
      text-align: center;
      margin-top: 5px;
    }

    .dot {
      height: 8px;
      width: 8px;
      margin: 0 3px;
      background: #bbb;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.active {
      background: #111;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal-content {
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 90%;
      text-align: center;
    }

    .modal img {
      width: 100%;
      border-radius: 10px;
    }

    .admin {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 3000;
      padding: 15px;
      overflow-y: auto;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }

    .admin-item {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #eee;
      margin: 5px 0;
      border-radius: 5px;
    }

    .admin-item button {
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
    }

    .btn {
      background: green;
      color: white;
      padding: 10px;
      border: none;
      width: 100%;
      margin-top: 5px;
      border-radius: 5px;
    }

    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: green;
      color: white;
      padding: 12px;
      border-radius: 50%;
      text-decoration: none;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>Ummuhalti</div>
  <div>
    <a href="#products">Products</a>
    <a onclick="openAdmin()">Admin</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Ummuhalti Collection</h1>
  <p>Shop by Category</p>
</div>

<!-- FILTER -->
<div class="filter-box">
  <select id="filter" onchange="filterProducts()">
    <option value="all">All Categories</option>
    <option value="Kaftan">Kaftan</option>
    <option value="Shirt">Shirt</option>
    <option value="Luxury">Luxury</option>
  </select>
</div>

<!-- PRODUCTS -->
<div class="carousel" id="productList"></div>
<div class="dots" id="dots"></div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <img id="mImg">
    <h3 id="mName"></h3>
    <p id="mCode"></p>
    <p id="mPrice"></p>
    <button class="btn" onclick="closeModal()">Close</button>
  </div>
</div>

<!-- ADMIN -->
<div class="admin" id="adminPanel">
  <h2>Admin Dashboard</h2>

  <input id="aName" placeholder="Product Name">
  <input id="aCode" placeholder="Product Code">
  <input id="aPrice" placeholder="Price">
  <input id="aCategory" placeholder="Category (Kaftan/Shirt/Luxury)">
  <input type="file" id="aImage">

  <button class="btn" onclick="addProduct()">Upload Product</button>

  <hr>
  <h3>Delete Products</h3>
  <div id="adminList"></div>

  <button class="btn" style="background:red" onclick="closeAdmin()">Close</button>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/2349114738932" class="whatsapp">💬</a>

<script>

const CLOUD_NAME = "db92r6j9z";
const UPLOAD_PRESET = "ummuhalti";

let products = JSON.parse(localStorage.getItem("products")) || [];

function display(list = products){

  let box = document.getElementById("productList");
  let dots = document.getElementById("dots");

  box.innerHTML = "";
  dots.innerHTML = "";

  list.forEach((p,i)=>{

    box.innerHTML += `
      <div class="card">

        <div class="img-box" onclick="openModal(${i})">
          <img src="${p.image}">
        </div>

        <div class="price">${p.price}</div>

        <h3>${p.name}</h3>
        <p>Category: ${p.category || "None"}</p>
        <p>${p.code}</p>

        <button class="buy-btn"
        onclick="buyNow('${p.name}','${p.code}','${p.price}','${p.image}')">
          <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
          Buy Now
        </button>

      </div>
    `;

    dots.innerHTML += `<span class="dot"></span>`;
  });

  loadAdminList();
}

/* BUY NOW */
function buyNow(name, code, price, image){

  let msg = `Hello, I want to order:

Product: ${name}
Code: ${code}
Price: ${price}

Image:
${image}`;

  let phone = "2349114738932";

  window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(msg), "_blank");
}

/* FILTER */
function filterProducts(){

  let value = document.getElementById("filter").value;

  if(value === "all"){
    display(products);
  } else {
    let filtered = products.filter(p => p.category === value);
    display(filtered);
  }
}

/* MODAL */
function openModal(i){
  let p = products[i];
  mImg.src = p.image;
  mName.innerText = p.name;
  mCode.innerText = p.code;
  mPrice.innerText = p.price;
  modal.style.display = "flex";
}

function closeModal(){
  modal.style.display = "none";
}

/* ADMIN */
function openAdmin(){
  let pass = prompt("Enter Password:");
  if(pass === "1234"){
    adminPanel.style.display = "block";
  } else alert("Wrong password");
}

function closeAdmin(){
  adminPanel.style.display = "none";
}

/* CLOUDINARY UPLOAD */
function addProduct(){

  let name = aName.value;
  let code = aCode.value;
  let price = aPrice.value;
  let category = aCategory.value;
  let file = aImage.files[0];

  let formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);

  fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {

    products.push({
      name,
      code,
      price,
      category,
      image: data.secure_url
    });

    localStorage.setItem("products", JSON.stringify(products));

    display();
    closeAdmin();

    alert("Uploaded successfully!");
  });
}

/* DELETE */
function deleteProduct(i){
  products.splice(i,1);
  localStorage.setItem("products", JSON.stringify(products));
  display();
}

/* ADMIN LIST */
function loadAdminList(){
  let box = document.getElementById("adminList");
  box.innerHTML = "";

  products.forEach((p,i)=>{
    box.innerHTML += `
      <div class="admin-item">
        <div>${p.name}<br><small>${p.code}</small></div>
        <button onclick="deleteProduct(${i})">Delete</button>
      </div>
    `;
  });
}

display();

</script>

</body>
</html>
