<!DOCTYPE html>
<html>
<head>
  <title>BOB TEXTILE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  padding-top:80px;
}

/* HEADER FIX */
.top-marquee{
  background:#111;
  position:fixed;
  top:0;
  width:100%;
  height:45px;
  display:flex;
  align-items:center;
  overflow:hidden;
  z-index:3000;
}

/* LOGO FIX (NO LEFT GAP) */
.logo{
  height:45px;
  margin:0;
  padding:0;
  object-fit:contain;
}

/* MARQUEE */
.marquee-wrapper{
  position:absolute;
  width:100%;
  overflow:hidden;
}

.marquee-text{
  white-space:nowrap;
  animation:move 12s linear infinite;
  color:white;
  margin-left:120px;
}

@keyframes move{
  0%{transform:translateX(100%);}
  100%{transform:translateX(-100%);}
}

/* ADMIN ICON */
.admin-icon{
  position:absolute;
  right:0;
  width:45px;
  height:45px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
}

/* CATEGORY */
.category-bar{
  position:fixed;
  top:45px;
  width:100%;
  height:40px;
  background:#222;
  display:flex;
  overflow-x:auto;
  z-index:2000;
}

.category-btn{
  color:white;
  padding:6px 14px;
  margin:5px;
  border-radius:20px;
  cursor:pointer;
}

.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}
.active-view{display:block;}

/* CARD */
.card{
  background:white;
  border-radius:14px;
  padding:10px;
  margin-bottom:15px;
  position:relative;
}

/* NEW BADGE FIX */
.new-badge{
  position:absolute;
  top:8px;
  left:8px;
  background:red;
  color:white;
  font-size:11px;
  padding:4px 6px;
  border-radius:5px;
  z-index:10;
}

/* CAROUSEL */
.carousel{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.carousel img{
  min-width:100%;
  height:350px;
  object-fit:contain;
  scroll-snap-align:center;
}

/* DOTS */
.dots{text-align:center;margin-top:5px;}

.dot{
  height:8px;width:8px;
  margin:0 3px;
  background:#bbb;
  border-radius:50%;
  display:inline-block;
}
.dot.active{background:#000;}

/* PRICE */
.price{
  background:#111;
  color:white;
  text-align:center;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

/* BUY */
.buy-btn{
  background:#25D366;
  color:white;
  border:none;
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

/* ADMIN */
.admin{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  z-index:5000;
  padding:15px;
  overflow:auto;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.btn{
  width:100%;
  padding:10px;
  background:green;
  color:white;
  border:none;
  margin-top:5px;
}

.admin-item{
  display:flex;
  gap:10px;
  align-items:center;
  background:#f2f2f2;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="top-marquee">
  <img src="logo.jpeg" class="logo">

  <div class="marquee-wrapper">
    <div class="marquee-text">✨ BOB TEXTILE ✨ Premium Fashion Store ✨</div>
  </div>

  <div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY -->
<div class="category-bar" id="categoryBar"></div>

<!-- ABOUT -->
<div id="aboutView" class="view active-view">
  <div class="card">
    <h2>BOB TEXTILE</h2>
  </div>
</div>

<!-- PRODUCTS -->
<div id="views"></div>

<!-- ADMIN -->
<div class="admin" id="adminPanel">

<h3>Admin Panel</h3>

<input id="aName" placeholder="Product Name">
<input id="aPrice" placeholder="Price">

<select id="aCategory"></select>

<button class="btn" onclick="uploadImage()">Upload Images</button>
<button class="btn" onclick="addProduct()">Save Product</button>

<hr>

<div id="adminList"></div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products"))||[];
let uploadedImages=[];
let categories=["shadda","bags","shoes","abayas","yard","caps","vail"];

/* SAVE LAST PAGE */
window.onload=()=>{
let last = localStorage.getItem("lastCat") || "shadda";
renderCategories();
showProducts(last);
};

/* CATEGORIES */
function renderCategories(){
let bar=document.getElementById("categoryBar");
let sel=document.getElementById("aCategory");

bar.innerHTML="";
sel.innerHTML="";

categories.forEach(c=>{
bar.innerHTML+=`<div class="category-btn" onclick="showProducts('${c}')">${c}</div>`;
sel.innerHTML+=`<option>${c}</option>`;
});
}

/* SHOW PRODUCTS */
function showProducts(type){

localStorage.setItem("lastCat",type);

document.querySelectorAll(".view").forEach(v=>v.classList.remove("active-view"));

let list = products.filter(p=>p.category===type);
let html="";

list.forEach((p,i)=>{

let isNew = (Date.now()-p.id)<86400000;

html+=`
<div class="card">

${isNew?'<div class="new-badge">NEW</div>':''}

<div class="carousel car${type}${i}">
${(p.images||[]).map(img=>`<img src="${img}">`).join("")}
</div>

<div class="dots dots${type}${i}"></div>

<div class="price">₦ ${p.price}</div>

<button class="buy-btn" onclick="buyNow('${type}',${i})">
📱 BUY NOW
</button>

</div>`;
});

document.getElementById("views").innerHTML=html;
setupCarousel(type,list);
}

/* CAROUSEL */
function setupCarousel(type,list){

list.forEach((p,i)=>{

let c=document.querySelector(".car"+type+i);
let box=document.querySelector(".dots"+type+i);

if(!c||!box)return;

let imgs=c.querySelectorAll("img");
box.innerHTML="";

imgs.forEach((_,x)=>{
let d=document.createElement("span");
d.className="dot";
if(x===0)d.classList.add("active");
box.appendChild(d);
});

let dots=box.querySelectorAll(".dot");

c.addEventListener("scroll",()=>{
let index=Math.round(c.scrollLeft/c.clientWidth);
dots.forEach(d=>d.classList.remove("active"));
if(dots[index])dots[index].classList.add("active");
});
});
}

/* WHATSAPP FIXED */
function buyNow(type,i){

let list = products.filter(p=>p.category===type);
let p = list[i];

let car=document.querySelector(".car"+type+i);
let index=0;

if(car){
index=Math.round(car.scrollLeft/car.clientWidth);
}

let img = p.images?.[index] || "";

let msg =
`Hello 👋,

I'm interested in this Product:

🧵 Category: ${type.toUpperCase()}
🛍️ Product: ${p.name}
💰 Price: ₦${p.price}

🖼️ Selected Image:
${img}

Is this available? I want to buy.`;

window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
}

/* ADMIN */
function openAdmin(){
if(prompt("Password")==="1234"){
adminPanel.style.display="block";
renderAdmin();
}
}

/* UPLOAD */
function uploadImage(){
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
multiple:true
},(e,r)=>{
if(r.event==="success"){
uploadedImages.push(r.info.secure_url);
}
});
}

/* SAVE */
function addProduct(){

products.unshift({
id:Date.now(),
name:aName.value,
price:aPrice.value,
category:aCategory.value,
images:[...uploadedImages]
});

localStorage.setItem("products",JSON.stringify(products));
uploadedImages=[];
renderAdmin();
}

/* ADMIN LIST */
function renderAdmin(){
let box=document.getElementById("adminList");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML+=`
<div class="admin-item">
<div style="flex:1">${p.name}</div>
<button onclick="del(${i})">Delete</button>
</div>`;
});
}

function del(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
renderAdmin();
}

</script>

</body>
</html>
