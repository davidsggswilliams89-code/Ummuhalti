<!DOCTYPE html>
<html>
<head>
  <title>BOB TEXTILE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

  <style>
    body{margin:0;font-family:Arial;background:#f5f5f5}

    .header{
      display:flex;
      align-items:center;
      height:70px;
      background:#fff;
      padding:0;
      position:fixed;
      top:0;
      width:100%;
      z-index:10;
    }

    .logo img{
      height:70px;
      margin:0;
    }

    .tabs{display:flex;overflow:auto;margin-top:70px;background:#fff}
    .tabs button{flex:1;padding:10px;border:none;background:#eee}

    .view{display:none;padding:10px}
    .active-view{display:block}

    .card{background:#fff;margin-bottom:10px;padding:10px;border-radius:10px}

    .img-box{position:relative}

    .new-badge{
      position:absolute;
      top:0;
      left:0;
      background:red;
      color:#fff;
      font-size:10px;
      padding:4px 6px;
      border-bottom-right-radius:6px;
    }

    .carousel{display:flex;overflow:auto}
    .carousel img{width:100%;border-radius:10px}

    .dots{text-align:center}
    .dot{display:inline-block;width:6px;height:6px;background:#ccc;border-radius:50%;margin:2px}
    .dot.active{background:#000}

    button{padding:10px;margin-top:5px;width:100%;border:none;background:#000;color:#fff;border-radius:5px}

    #adminPanel{display:none;padding:10px;background:#fff}
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="logo.jpeg">
  </div>
</div>

<div class="tabs">
  <button onclick="showView('kaftan')">Kaftan</button>
  <button onclick="showView('lace')">Lace</button>
  <button onclick="showView('bags')">Bags</button>
  <button onclick="showView('shoes')">Shoes</button>
  <button onclick="showView('abayas')">Abayas</button>
  <button onclick="showView('yard')">Yard</button>
  <button onclick="showView('caps')">Caps</button>
  <button onclick="showView('vail')">Vail</button>
</div>

<div id="kaftanView" class="view"></div>
<div id="laceView" class="view"></div>
<div id="bagsView" class="view"></div>
<div id="shoesView" class="view"></div>
<div id="abayasView" class="view"></div>
<div id="yardView" class="view"></div>
<div id="capsView" class="view"></div>
<div id="vailView" class="view"></div>

<button onclick="openAdmin()">Admin</button>

<div id="adminPanel">
  <h3>Add Product</h3>
  <input id="aName" placeholder="Name"><br>
  <input id="aPrice" placeholder="Price"><br>
  <select id="aCategory"></select><br>
  <button onclick="uploadImage()">Upload Images</button>
  <button onclick="addProduct()">Add</button>

  <h3>Delete Product</h3>
  <select id="deleteCategory"></select>
  <div id="deleteList"></div>

  <h3>Edit Product</h3>
  <select id="editCategory"></select>
  <div id="editList"></div>
  <input id="editName">
  <input id="editPrice">
  <button onclick="saveEdit()">Save</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let uploadedImages = [];
let editIndex = null;

function showView(type){
  localStorage.setItem("activeView", type);

  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active-view"));

  let list = products.filter(p=>p.category===type);
  let html="";

  list.forEach((p,i)=>{
    let isNew = (Date.now()-p.date)<86400000;

    html+=`<div class="card">
      <div class="img-box">
        ${isNew?'<span class="new-badge">NEW</span>':''}
        <div class="carousel car${type+i}">
          ${p.images.map(img=>`<img src="${img}">`).join("")}
        </div>
      </div>
      <div class="dots dots${type+i}"></div>
      <p>${p.name}</p>
      <p>₦${p.price}</p>
      <button onclick="buyNow(${i},'${type}')">BUY NOW</button>
    </div>`;
  });

  document.getElementById(type+"View").innerHTML=html;
  document.getElementById(type+"View").classList.add("active-view");

  list.forEach((p,i)=>setupCarousel(".car"+type+i,".dots"+type+i));
}

function buyNow(i,type){
  let list=products.filter(p=>p.category===type);
  let p=list[i];

  let car=document.querySelector(".car"+type+i);
  let imgs=car.querySelectorAll("img");
  let index=Math.round(car.scrollLeft/car.clientWidth);

  let msg=`Hello 👋\nI want to order this product:\n\nCategory: ${type}\nName: ${p.name}\nPrice: ₦${p.price}\nImage: ${imgs[index].src}\n\nIs it available?`;

  window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
}

function setupCarousel(car,dots){
  let c=document.querySelector(car);
  let box=document.querySelector(dots);
  if(!c)return;

  let imgs=c.querySelectorAll("img");
  box.innerHTML="";

  imgs.forEach((_,i)=>{
    let d=document.createElement("span");
    d.classList.add("dot");
    if(i===0)d.classList.add("active");
    box.appendChild(d);
  });

  let dot=box.querySelectorAll(".dot");

  c.addEventListener("scroll",()=>{
    let i=Math.round(c.scrollLeft/c.clientWidth);
    dot.forEach(x=>x.classList.remove("active"));
    if(dot[i])dot[i].classList.add("active");
  });
}

function openAdmin(){
  if(prompt("Password")==="1234"){
    adminPanel.style.display="block";
    fill();
  }
}

function fill(){
  let cats=["kaftan","lace","bags","shoes","abayas","yard","caps","vail"];
  aCategory.innerHTML=cats.map(x=>`<option>${x}</option>`).join("");
  deleteCategory.innerHTML=cats.map(x=>`<option>${x}</option>`).join("");
  editCategory.innerHTML=cats.map(x=>`<option>${x}</option>`).join("");

  deleteCategory.onchange=loadDeleteList;
  editCategory.onchange=loadEditList;

  loadDeleteList();
  loadEditList();
}

function uploadImage(){
  cloudinary.openUploadWidget({
    cloudName:"db92r6j9z",
    uploadPreset:"ummuhalti",
    multiple:true
  },(e,r)=>{
    if(r&&r.event==="success"){
      uploadedImages.push(r.info.secure_url);
    }
  });
}

function addProduct(){
  products.unshift({
    name:aName.value,
    price:aPrice.value,
    category:aCategory.value,
    images:[...uploadedImages],
    date:Date.now()
  });

  localStorage.setItem("products",JSON.stringify(products));
  uploadedImages=[];
  showView(aCategory.value);
}

function loadDeleteList(){
  let cat=deleteCategory.value;
  deleteList.innerHTML="";

  products.forEach((p,i)=>{
    if(p.category===cat){
      deleteList.innerHTML+=`<div>
        <img src="${p.images[0]}" width="40">
        <button onclick="del(${i})">Delete</button>
      </div>`;
    }
  });
}

function del(i){
  products.splice(i,1);
  localStorage.setItem("products",JSON.stringify(products));
  loadDeleteList();
}

function loadEditList(){
  let cat=editCategory.value;
  editList.innerHTML="";

  products.forEach((p,i)=>{
    if(p.category===cat){
      editList.innerHTML+=`<div>
        <img src="${p.images[0]}" width="40">
        <button onclick="startEdit(${i})">Edit</button>
      </div>`;
    }
  });
}

function startEdit(i){
  editIndex=i;
  editName.value=products[i].name;
  editPrice.value=products[i].price;
}

function saveEdit(){
  products[editIndex].name=editName.value;
  products[editIndex].price=editPrice.value;
  products[editIndex].date=Date.now();

  localStorage.setItem("products",JSON.stringify(products));
  loadEditList();
}

window.onload=function(){
  let saved=localStorage.getItem("activeView")||"kaftan";
  showView(saved);
}
</script>

</body>
</html>
