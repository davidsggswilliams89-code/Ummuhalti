<!DOCTYPE html>
<html>
<head>
  <title>Ummuhalti Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; padding-top:90px; }

    /* HEADER */
    .top-marquee {
      background:#111; color:white; position:fixed; top:0; width:100%;
      padding:8px; display:flex; align-items:center; z-index:2000;
    }

    .marquee-text {
      animation:move 10s linear infinite;
      white-space:nowrap;
    }

    @keyframes move {
      from{transform:translateX(100%);}
      to{transform:translateX(-100%);}
    }

    .admin-icon {
      position:absolute; right:10px;
      background:#25D366; padding:6px 10px;
      border-radius:50%; cursor:pointer;
    }

    /* CATEGORY */
    .category-bar {
      position:fixed; top:40px; width:100%;
      background:#222; display:flex; overflow-x:auto;
    }

    .category-bar div {
      color:white; padding:10px; cursor:pointer;
    }

    /* VIEW */
    .view { display:none; }
    .active { display:block; }

    /* NORMAL CAROUSEL */
    .carousel {
      display:flex;
      overflow-x:auto;
      gap:15px;
      padding:10px;
    }

    .card {
      min-width:85%;
      background:white;
      border-radius:12px;
      padding:10px;
    }

    /* ===== KAFTAN SLIDER ===== */
    .slider-container {
      margin:10px;
      background:white;
      border-radius:12px;
      overflow:hidden;
      position:relative;
    }

    .slider {
      display:flex;
      transition:transform 0.4s ease;
    }

    .slide {
      min-width:100%;
      position:relative;
    }

    .slide img {
      width:100%;
      height:260px;
      object-fit:cover;
    }

    /* NEW BADGE */
    .new-badge {
      position:absolute;
      top:10px;
      left:10px;
      background:red;
      color:white;
      padding:5px 8px;
      font-size:12px;
      border-radius:5px;
      font-weight:bold;
    }

    /* BOTTOM INFO */
    .slide-bottom {
      position:absolute;
      bottom:0;
      width:100%;
      background:rgba(0,0,0,0.6);
      color:white;
      padding:10px;
      text-align:center;
    }

    .slide-bottom button {
      background:#25D366;
      border:none;
      color:white;
      padding:8px 12px;
      border-radius:20px;
      margin-top:5px;
    }

    /* DOTS */
    .dots {
      text-align:center;
      padding:5px;
    }

    .dot {
      display:inline-block;
      width:8px;
      height:8px;
      background:#ccc;
      margin:3px;
      border-radius:50%;
    }

    .active-dot {
      background:#25D366;
    }

    /* ADMIN */
    .admin {
      display:none;
      position:fixed;
      top:0;
      width:100%;
      height:100%;
      background:white;
      z-index:3000;
      padding:15px;
      overflow:auto;
    }

    input, select {
      width:100%;
      padding:10px;
      margin:5px 0;
    }

    .btn {
      background:green;
      color:white;
      padding:10px;
      border:none;
      width:100%;
      margin-top:5px;
      border-radius:8px;
    }

    .admin-item {
      display:flex;
      align-items:center;
      gap:10px;
      background:#eee;
      padding:8px;
      margin:5px 0;
      border-radius:8px;
    }

    .admin-item img {
      width:50px;
      height:50px;
      object-fit:cover;
    }

    .delete-btn {
      background:red;
      color:white;
      border:none;
      padding:5px 10px;
      border-radius:5px;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="top-marquee">
  <div class="marquee-text">✨ Ummuhalti Collection ✨ Premium Fashion Store ✨</div>
  <div class="admin-icon" onclick="openAdmin()">🔐</div>
</div>

<!-- CATEGORY -->
<div class="category-bar">
  <div onclick="showView('all')">ALL</div>
  <div onclick="showView('kaftan')">KAFTAN</div>
  <div onclick="showView('lace')">LACE</div>
  <div onclick="showView('bags')">BAGS</div>
  <div onclick="showView('shoes')">SHOES</div>
  <div onclick="showView('abayas')">ABAYAS</div>
</div>

<!-- VIEWS -->
<div id="views">
  <div id="allView" class="view"></div>
  <div id="kaftanView" class="view"></div>
  <div id="laceView" class="view"></div>
  <div id="bagsView" class="view"></div>
  <div id="shoesView" class="view"></div>
  <div id="abayasView" class="view"></div>
</div>

<!-- ADMIN -->
<div class="admin" id="adminPanel">

  <h2>Admin Panel</h2>

  <input id="aName" placeholder="Product Name">
  <input id="aPrice" placeholder="Price">

  <select id="aCategory">
    <option>Kaftan</option>
    <option>Lace</option>
    <option>Bags</option>
    <option>Shoes</option>
    <option>Abayas</option>
  </select>

  <button class="btn" onclick="uploadImage()">Upload Image</button>
  <p id="uploadStatus">No image selected</p>
  <img id="preview" style="width:100%; display:none;">

  <button class="btn" onclick="addProduct()">Add Product</button>

  <hr>

  <select id="filterCategory" onchange="loadAdmin()">
    <option value="all">All</option>
    <option value="Kaftan">Kaftan</option>
    <option value="Lace">Lace</option>
    <option value="Bags">Bags</option>
    <option value="Shoes">Shoes</option>
    <option value="Abayas">Abayas</option>
  </select>

  <div id="adminList"></div>

  <button class="btn" onclick="closeAdmin()">Close</button>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let uploadedImage = "";

/* UPLOAD */
function uploadImage(){
  cloudinary.openUploadWidget({
    cloudName:"db92r6j9z",
    uploadPreset:"ummuhalti"
  },
  function(error,result){
    if(result && result.event==="success"){
      uploadedImage = result.info.secure_url;
      preview.src = uploadedImage;
      preview.style.display="block";
      uploadStatus.innerText="Uploaded ✔";
    }
  });
}

/* ADD PRODUCT */
function addProduct(){
  if(!uploadedImage) return alert("Upload image");

  let p = {
    name:aName.value,
    price:aPrice.value,
    category:aCategory.value,
    image:uploadedImage,
    date:Date.now()
  };

  products.unshift(p);
  localStorage.setItem("products", JSON.stringify(products));

  uploadedImage="";
  preview.style.display="none";
  showView("all");
}

/* NORMAL CAROUSEL */
function createCarousel(list){
  let html='<div class="carousel">';
  list.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <div class="price">₦${p.price}</div>
    </div>`;
  });
  html+='</div>';
  return html;
}

/* KAFTAN SLIDER */
function createSlider(list, id){

  let html = `<div class="slider-container">
    <div class="slider" id="${id}">`;

  list.forEach(p=>{
    let isNew = (Date.now() - p.date) < (24*60*60*1000);

    html+=`
      <div class="slide">
        ${isNew ? '<div class="new-badge">NEW</div>' : ''}
        <img src="${p.image}">
        <div class="slide-bottom">
          ${p.name}<br>₦${p.price}
          <br><button onclick="buyNow('${p.name}','${p.price}','${p.image}')">Buy</button>
        </div>
      </div>`;
  });

  html += `</div><div class="dots" id="dots-${id}"></div></div>`;
  return html;
}

/* VIEW */
function showView(type){

  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));

  let data = (type==="all")
    ? products
    : products.filter(p=>p.category.toLowerCase()===type);

  let box=document.getElementById(type+"View");
  box.classList.add("active");

  if(type==="kaftan"){

    let mid = Math.ceil(data.length/2);

    box.innerHTML =
      createSlider(data.slice(0,mid),"s1") +
      createSlider(data.slice(mid),"s2");

    initSwipe("s1");
    initSwipe("s2");

  } else {
    box.innerHTML = createCarousel(data);
  }
}

/* SWIPE */
function initSwipe(id){
  let slider=document.getElementById(id);
  let index=0;

  let startX=0;

  slider.addEventListener("touchstart",e=>{
    startX=e.touches[0].clientX;
  });

  slider.addEventListener("touchend",e=>{
    let endX=e.changedTouches[0].clientX;

    if(startX-endX>50) index++;
    if(endX-startX>50) index--;

    let total=slider.children.length;
    if(index<0) index=0;
    if(index>=total) index=total-1;

    slider.style.transform=`translateX(-${index*100}%)`;
    updateDots(id,index,total);
  });

  createDots(id,slider.children.length);
}

/* DOTS */
function createDots(id,total){
  let box=document.getElementById("dots-"+id);
  box.innerHTML="";
  for(let i=0;i<total;i++){
    box.innerHTML+=`<span class="dot"></span>`;
  }
}

function updateDots(id,index,total){
  let dots=document.querySelectorAll("#dots-"+id+" .dot");
  dots.forEach(d=>d.classList.remove("active-dot"));
  if(dots[index]) dots[index].classList.add("active-dot");
}

/* BUY */
function buyNow(name,price,image){
  let msg=`Hello, I want to order:\n${name}\n₦${price}\n${image}`;
  window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
}

/* ADMIN */
function openAdmin(){
  if(prompt("Password")==="1234"){
    adminPanel.style.display="block";
    loadAdmin();
  }
}

function closeAdmin(){
  adminPanel.style.display="none";
}

function loadAdmin(){
  let box=document.getElementById("adminList");
  box.innerHTML="";
  products.forEach((p,i)=>{
    box.innerHTML+=`
    <div class="admin-item">
      <img src="${p.image}">
      <div>${p.name}</div>
      <button class="delete-btn" onclick="deleteProduct(${i})">Delete</button>
    </div>`;
  });
}

function deleteProduct(i){
  products.splice(i,1);
  localStorage.setItem("products",JSON.stringify(products));
  loadAdmin();
  showView("all");
}

/* INIT */
showView("all");

</script>

</body>
</html>
