<!DOCTYPE html>
<html>
<head>
  <title>Ummuhalti Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; padding-top:90px; }

    /* HEADER */
    .top-marquee {
      background:#111; color:white; position:fixed; top:0; width:100%;
      padding:8px; display:flex; align-items:center; z-index:2000;
    }

    .marquee-text { animation:move 10s linear infinite; white-space:nowrap; }
    @keyframes move { from{transform:translateX(100%);} to{transform:translateX(-100%);} }

    .admin-icon {
      position:absolute; right:10px;
      background:#25D366; padding:6px 10px;
      border-radius:50%; cursor:pointer;
    }

    /* CATEGORY */
    .category-bar {
      position:fixed; top:40px; width:100%;
      background:#222; display:flex; overflow-x:auto;
    }

    .category-bar div {
      color:white; padding:10px; cursor:pointer;
    }

    /* VIEW */
    .view { display:none; }
    .active { display:block; }

    /* CAROUSEL */
    .carousel { display:flex; overflow-x:auto; gap:15px; padding:10px; }

    .card {
      min-width:85%;
      background:white;
      border-radius:12px;
      padding:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    img { width:100%; border-radius:10px; }

    /* PRICE */
    .price {
      background:#111;
      color:white;
      text-align:center;
      padding:8px;
      border-radius:10px;
      margin-top:5px;
      font-weight:bold;
    }

    /* BUY BUTTON */
    .buy-btn {
      background:#25D366;
      color:white;
      border:none;
      width:100%;
      padding:12px;
      margin-top:8px;
      border-radius:25px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      font-size:14px;
      cursor:pointer;
    }

    .buy-btn img { width:18px; }

    /* ADMIN */
    .admin {
      display:none;
      position:fixed;
      top:0;
      width:100%;
      height:100%;
      background:white;
      z-index:3000;
      padding:15px;
      overflow:auto;
    }

    input, select {
      width:100%;
      padding:10px;
      margin:5px 0;
    }

    .btn {
      background:green;
      color:white;
      padding:10px;
      border:none;
      width:100%;
      margin-top:5px;
      border-radius:8px;
    }

    .admin-item {
      display:flex;
      align-items:center;
      gap:10px;
      background:#eee;
      padding:8px;
      margin:5px 0;
      border-radius:8px;
    }

    .admin-item img {
      width:50px;
      height:50px;
      object-fit:cover;
      border-radius:5px;
    }

    .delete-btn {
      background:red;
      color:white;
      border:none;
      padding:5px 10px;
      border-radius:5px;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="top-marquee">
  <div class="marquee-text">✨ Ummuhalti Collection ✨ Premium Fashion Store ✨</div>
  <div class="admin-icon" onclick="openAdmin()">🔐</div>
</div>

<!-- CATEGORY -->
<div class="category-bar">
  <div onclick="showView('all')">ALL</div>
  <div onclick="showView('kaftan')">KAFTAN</div>
  <div onclick="showView('lace')">LACE</div>
  <div onclick="showView('bags')">BAGS</div>
  <div onclick="showView('shoes')">SHOES</div>
  <div onclick="showView('abayas')">ABAYAS</div>
</div>

<!-- VIEWS -->
<div id="views">
  <div id="allView" class="view"></div>
  <div id="kaftanView" class="view"></div>
  <div id="laceView" class="view"></div>
  <div id="bagsView" class="view"></div>
  <div id="shoesView" class="view"></div>
  <div id="abayasView" class="view"></div>
</div>

<!-- ADMIN -->
<div class="admin" id="adminPanel">

  <h2>Admin Panel</h2>

  <input id="aName" placeholder="Product Name">
  <input id="aPrice" placeholder="Price (e.g 5000)">

  <select id="aCategory">
    <option>Kaftan</option>
    <option>Lace</option>
    <option>Bags</option>
    <option>Shoes</option>
    <option>Abayas</option>
  </select>

  <button class="btn" onclick="uploadImage()">Upload Image</button>
  <p id="uploadStatus">No image selected</p>
  <img id="preview" style="width:100%; display:none; border-radius:10px;">

  <button class="btn" onclick="addProduct()">Add Product</button>

  <hr>

  <h3>Select Category</h3>

  <select id="filterCategory" onchange="loadAdmin()">
    <option value="all">All</option>
    <option value="Kaftan">Kaftan</option>
    <option value="Lace">Lace</option>
    <option value="Bags">Bags</option>
    <option value="Shoes">Shoes</option>
    <option value="Abayas">Abayas</option>
  </select>

  <div id="adminList"></div>

  <button class="btn" onclick="closeAdmin()">Close</button>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let uploadedImage = "";

/* UPLOAD */
function uploadImage(){
  cloudinary.openUploadWidget({
    cloudName:"db92r6j9z",
    uploadPreset:"ummuhalti"
  },
  function(error,result){
    if(result && result.event==="success"){
      uploadedImage = result.info.secure_url;
      preview.src = uploadedImage;
      preview.style.display="block";
      uploadStatus.innerText="Uploaded ✔";
    }
  });
}

/* ADD PRODUCT */
function addProduct(){

  if(!uploadedImage) return alert("Upload image");

  let p = {
    name:aName.value,
    price:aPrice.value,
    category:aCategory.value,
    image:uploadedImage
  };

  products.push(p);
  localStorage.setItem("products", JSON.stringify(products));

  uploadedImage="";
  preview.style.display="none";
  uploadStatus.innerText="No image selected";

  showView("all");
  loadAdmin();
}

/* DISPLAY */
function createCarousel(list){
  let html='<div class="carousel">';

  list.forEach(p=>{
    html+=`
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>

        <div class="price">₦${p.price}</div>

        <button class="buy-btn"
        onclick="buyNow('${p.name}','${p.price}','${p.image}')">

          <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
          Buy Now

        </button>
      </div>`;
  });

  html+='</div>';
  return html;
}

function showView(type){

  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));

  let data = (type==="all")
    ? products
    : products.filter(p=>p.category.toLowerCase()===type);

  let box=document.getElementById(type+"View");
  box.classList.add("active");
  box.innerHTML=createCarousel(data);
}

/* BUY */
function buyNow(name, price, image){

  let msg=`Hello, I want to order:

Product: ${name}
Price: ₦${price}

${image}`;

  window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
}

/* ADMIN */
function openAdmin(){
  if(prompt("Password:")==="1234"){
    adminPanel.style.display="block";
    loadAdmin();
  }
}

function closeAdmin(){
  adminPanel.style.display="none";
}

/* DELETE */
function deleteProduct(i){
  if(confirm("Delete?")){
    products.splice(i,1);
    localStorage.setItem("products", JSON.stringify(products));
    loadAdmin();
    showView("all");
  }
}

/* ADMIN LIST */
function loadAdmin(){

  let cat = filterCategory.value;

  let list = (cat==="all")
    ? products
    : products.filter(p=>p.category===cat);

  let box=document.getElementById("adminList");
  box.innerHTML="";

  list.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="admin-item">
        <img src="${p.image}">
        <div style="flex:1;">
          <b>${p.name}</b><br>
          <small>${p.category}</small>
        </div>
        <button class="delete-btn" onclick="deleteProduct(${i})">
          Delete
        </button>
      </div>`;
  });
}

/* INIT */
showView("all");

</script>

</body>
</html>
