<!DOCTYPE html>
<html>
<head>
  <title>BOB TEXTILE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  padding-top:80px;
}

/* HEADER */
.top-marquee{
  background:#111;
  position:fixed;
  top:0;
  width:100%;
  height:45px;
  display:flex;
  align-items:center;
  overflow:hidden;
  z-index:3000;
}

.logo{
  height:45px;
  object-fit:contain;
}

.marquee-wrapper{
  position:absolute;
  width:100%;
  overflow:hidden;
}

.marquee-text{
  white-space:nowrap;
  animation:move 12s linear infinite;
  color:white;
  margin-left:120px;
}

@keyframes move{
  0%{transform:translateX(100%);}
  100%{transform:translateX(-100%);}
}

.admin-icon{
  position:absolute;
  right:0;
  width:45px;
  height:45px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
}

#notifDot{
  width:8px;
  height:8px;
  background:red;
  border-radius:50%;
  display:none;
  margin-left:5px;
}

/* CATEGORY */
.category-bar{
  position:fixed;
  top:45px;
  width:100%;
  height:40px;
  background:#222;
  display:flex;
  overflow-x:auto;
  z-index:2000;
}

.category-btn{
  color:white;
  padding:6px 14px;
  margin:5px;
  border-radius:20px;
  cursor:pointer;
}

.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}
.active-view{display:block;}

.card{
  background:white;
  border-radius:14px;
  padding:10px;
  margin-bottom:15px;
}

/* CAROUSEL */
.carousel{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.carousel img{
  min-width:100%;
  height:250px;
  object-fit:cover;
  border-radius:12px;
  scroll-snap-align:center;
}

.carousel::-webkit-scrollbar{display:none;}

.dots{text-align:center;margin-top:5px;}
.dot{
  height:8px;width:8px;
  margin:0 3px;
  background:#bbb;
  border-radius:50%;
  display:inline-block;
}
.dot.active{background:#000;}

/* FORM */
input,textarea,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.btn{
  width:100%;
  padding:10px;
  background:green;
  color:white;
  border:none;
  margin-top:5px;
  cursor:pointer;
}

.admin{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  z-index:5000;
  padding:15px;
  overflow:auto;
}

.admin-item{
  display:flex;
  gap:10px;
  align-items:center;
  background:#f2f2f2;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
}

.delete-btn{
  background:red;
  color:white;
  border:none;
  padding:6px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top-marquee">
  <img src="logo.jpeg" class="logo">

  <div class="marquee-wrapper">
    <div class="marquee-text">
      ✨ BOB TEXTILE ✨ Premium Fashion Store ✨ Quality Fabrics ✨
    </div>
  </div>

  <div class="admin-icon" onclick="openAdmin()">
    🔒 <span id="notifDot"></span>
  </div>
</div>

<!-- CATEGORY -->
<div class="category-bar">
  <div class="category-btn" onclick="showView('about',this)">ABOUT</div>
</div>

<!-- ABOUT -->
<div id="aboutView" class="view active-view">

  <!-- IMAGE TESTIMONIAL -->
  <div class="card">
    <h3 style="text-align:center;">🖼️ Customer Moments</h3>

    <div class="carousel" id="imgCarousel"></div>
    <div class="dots" id="imgDots"></div>
  </div>

  <!-- TEXT REVIEWS -->
  <div class="card">
    <h3 style="text-align:center;">💬 Customer Reviews</h3>
    <div id="textReviews"></div>
  </div>

  <!-- REVIEW FORM -->
  <div class="card">
    <h3 style="text-align:center;">📝 Leave a Review</h3>

    <input id="revName" placeholder="Your Name">
    <textarea id="revMsg" placeholder="Your Message"></textarea>

    <button class="btn" onclick="submitReview()">Submit Review</button>
  </div>

</div>

<!-- ADMIN -->
<div class="admin" id="adminPanel">

<h3>Admin Panel</h3>

<h3>🛠 Pending Reviews</h3>
<div id="reviewList"></div>

<hr>

<h3>🖼 Upload Testimonial Images</h3>
<button class="btn" onclick="uploadImage()">Upload Image</button>

<button class="btn" onclick="closeAdmin()" style="background:red;">Close</button>

</div>

<script>

let imageTestimonials = JSON.parse(localStorage.getItem("imageTestimonials")) || [];
let reviews = JSON.parse(localStorage.getItem("reviews")) || [];
let pendingReviews = JSON.parse(localStorage.getItem("pendingReviews")) || [];
let hasNewReview = localStorage.getItem("hasNewReview")==="true";

/* VIEW */
function showView(type,el){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active-view"));
  document.getElementById(type+"View").classList.add("active-view");
}

/* SUBMIT REVIEW + WHATSAPP ALERT */
function submitReview(){
  if(!revName.value || !revMsg.value){
    alert("Fill all fields");
    return;
  }

  let name = revName.value;
  let msg = revMsg.value;

  pendingReviews.unshift({name,msg,time:Date.now()});
  localStorage.setItem("pendingReviews",JSON.stringify(pendingReviews));

  hasNewReview=true;
  localStorage.setItem("hasNewReview","true");

  // 🔔 WHATSAPP ALERT
  let text = `🚨 NEW REVIEW 🚨

Name: ${name}
Message: ${msg}`;

  window.open("https://wa.me/2349114738932?text="+encodeURIComponent(text));

  revName.value="";
  revMsg.value="";

  updateNotif();
}

/* NOTIF */
function updateNotif(){
  document.getElementById("notifDot").style.display =
    hasNewReview ? "inline-block" : "none";
}

/* ADMIN */
function openAdmin(){
  if(prompt("Password")==="1234"){
    adminPanel.style.display="block";
    loadReviews();

    hasNewReview=false;
    localStorage.setItem("hasNewReview","false");
    updateNotif();
  }
}

function closeAdmin(){
  adminPanel.style.display="none";
}

/* LOAD REVIEWS */
function loadReviews(){
  let box=document.getElementById("reviewList");
  box.innerHTML="";

  pendingReviews.forEach((r,i)=>{
    box.innerHTML+=`
    <div class="admin-item">
      <div style="flex:1">
        <b>${r.name}</b><br>${r.msg}
      </div>

      <button class="btn" onclick="approve(${i})">Approve</button>
      <button class="delete-btn" onclick="reject(${i})">X</button>
    </div>`;
  });
}

/* APPROVE */
function approve(i){
  let r = pendingReviews.splice(i,1)[0];
  reviews.unshift(r);

  localStorage.setItem("reviews",JSON.stringify(reviews));
  localStorage.setItem("pendingReviews",JSON.stringify(pendingReviews));

  loadReviews();
  loadText();
}

/* REJECT */
function reject(i){
  pendingReviews.splice(i,1);
  localStorage.setItem("pendingReviews",JSON.stringify(pendingReviews));
  loadReviews();
}

/* TEXT REVIEWS */
function loadText(){
  let box=document.getElementById("textReviews");
  if(!box) return;

  box.innerHTML="";

  reviews.forEach(r=>{
    box.innerHTML+=`
    <div class="card">
      <b>👤 ${r.name}</b>
      <p>${r.msg}</p>
    </div>`;
  });
}

/* IMAGE TESTIMONIAL */
function loadImages(){
  let box=document.getElementById("imgCarousel");
  let dots=document.getElementById("imgDots");

  box.innerHTML="";
  dots.innerHTML="";

  imageTestimonials.forEach(img=>{
    box.innerHTML+=`<img src="${img}">`;
  });

  let dArr=[];

  imageTestimonials.forEach((_,i)=>{
    let d=document.createElement("span");
    d.className="dot";
    if(i===0)d.classList.add("active");
    dots.appendChild(d);
    dArr.push(d);
  });

  let index=0;

  setInterval(()=>{
    if(imageTestimonials.length===0) return;

    index++;
    if(index>=imageTestimonials.length) index=0;

    box.scrollTo({
      left:index*box.clientWidth,
      behavior:"smooth"
    });

    dArr.forEach(x=>x.classList.remove("active"));
    if(dArr[index]) dArr[index].classList.add("active");

  },3000);
}

/* UPLOAD IMAGE */
function uploadImage(){
  cloudinary.openUploadWidget({
    cloudName:"db92r6j9z",
    uploadPreset:"ummuhalti",
    multiple:true
  },(e,r)=>{
    if(r.event==="success"){
      imageTestimonials.unshift(r.info.secure_url);
      localStorage.setItem("imageTestimonials",JSON.stringify(imageTestimonials));
      loadImages();
    }
  });
}

/* INIT */
window.onload=()=>{
  loadImages();
  loadText();
  updateNotif();
};

</script>

</body>
</html>
