<!DOCTYPE html>
<html>
<head>
  <title>Ummuhalti Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
      padding-top: 90px;
    }

    /* HEADER */
    .top-marquee {
      background: #111;
      color: white;
      position: fixed;
      top: 0;
      width: 100%;
      padding: 8px;
      z-index: 2000;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .marquee-text {
      animation: move 10s linear infinite;
      white-space: nowrap;
    }

    @keyframes move {
      from { transform: translateX(100%); }
      to { transform: translateX(-100%); }
    }

    .admin-icon {
      position: absolute;
      right: 10px;
      background: #25D366;
      padding: 6px 10px;
      border-radius: 50%;
      cursor: pointer;
    }

    /* CATEGORY */
    .category-bar {
      position: fixed;
      top: 40px;
      width: 100%;
      background: #222;
      display: flex;
      overflow-x: auto;
    }

    .category-bar div {
      color: white;
      padding: 10px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    /* VIEW */
    .view { display: none; }
    .active { display: block; }

    /* CAROUSEL */
    .carousel {
      display: flex;
      overflow-x: auto;
      gap: 15px;
      padding: 10px;
    }

    .card {
      min-width: 85%;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    img { width: 100%; border-radius: 10px; }

    .price {
      background: black;
      color: white;
      text-align: center;
      padding: 5px;
      border-radius: 5px;
    }

    .buy-btn {
      background: #25D366;
      color: white;
      border: none;
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
    }

    /* ADMIN */
    .admin {
      display: none;
      position: fixed;
      top: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 3000;
      padding: 15px;
      overflow: auto;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }

    .btn {
      background: green;
      color: white;
      padding: 10px;
      border: none;
      width: 100%;
      margin-top: 5px;
      border-radius: 5px;
    }

    /* ADMIN LIST FIX */
    .admin-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #eee;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
    }

    .admin-item img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 5px;
    }

    .delete-btn {
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="top-marquee">
  <div class="marquee-text">✨ Ummuhalti Collection ✨ Premium Fashion Store ✨</div>
  <div class="admin-icon" onclick="openAdmin()">🔐</div>
</div>

<!-- CATEGORY -->
<div class="category-bar">
  <div onclick="showView('all')">ALL</div>
  <div onclick="showView('kaftan')">KAFTAN</div>
  <div onclick="showView('lace')">LACE</div>
  <div onclick="showView('bags')">BAGS</div>
  <div onclick="showView('shoes')">SHOES</div>
  <div onclick="showView('abayas')">ABAYAS</div>
</div>

<!-- VIEWS -->
<div id="views">
  <div id="allView" class="view"></div>
  <div id="kaftanView" class="view"></div>
  <div id="laceView" class="view"></div>
  <div id="bagsView" class="view"></div>
  <div id="shoesView" class="view"></div>
  <div id="abayasView" class="view"></div>
</div>

<!-- ADMIN -->
<div class="admin" id="adminPanel">

  <h2>Admin Panel</h2>

  <input id="aName" placeholder="Name">
  <input id="aCode" placeholder="Code">
  <input id="aPrice" placeholder="Price">
  <input id="aCategory" placeholder="Category (Kaftan, Lace...)">
  <input id="aImage" placeholder="Image URL">

  <button class="btn" onclick="addProduct()">Add Product</button>

  <h3>Manage Products</h3>
  <div id="adminList"></div>

  <button class="btn" onclick="closeAdmin()">Close</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

/* DISPLAY */
function createCarousel(list){
  let html = '<div class="carousel">';

  list.forEach(p=>{
    html += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.category}</p>
        <div class="price">${p.price}</div>

        <button class="buy-btn"
        onclick="buyNow('${p.name}','${p.code}','${p.price}','${p.image}')">
          Buy Now
        </button>
      </div>
    `;
  });

  html += '</div>';
  return html;
}

function showView(type){
  document.querySelectorAll(".view").forEach(v=>{
    v.classList.remove("active");
  });

  let data = products;

  if(type !== "all"){
    data = products.filter(p =>
      p.category.toLowerCase() === type
    );
  }

  let box = document.getElementById(type+"View");
  box.classList.add("active");
  box.innerHTML = createCarousel(data);
}

/* BUY */
function buyNow(name, code, price, image){
  let msg = `Hello, I want to order:

Product: ${name}
Code: ${code}
Price: ${price}

${image}`;

  window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
}

/* ADMIN */
function openAdmin(){
  let pass = prompt("Password:");
  if(pass === "1234"){
    adminPanel.style.display="block";
    loadAdmin();
  }
}

function closeAdmin(){
  adminPanel.style.display="none";
}

/* ADD */
function addProduct(){
  let p = {
    name: aName.value,
    code: aCode.value,
    price: aPrice.value,
    category: aCategory.value.trim(),
    image: aImage.value
  };

  products.push(p);
  localStorage.setItem("products", JSON.stringify(products));

  showView("all");
  loadAdmin();
}

/* DELETE + DRAG */
let dragIndex = null;

function dragStart(i){
  dragIndex = i;
}

function dropItem(i){
  let temp = products[dragIndex];
  products.splice(dragIndex,1);
  products.splice(i,0,temp);

  localStorage.setItem("products", JSON.stringify(products));
  loadAdmin();
}

function deleteProduct(i){
  if(confirm("Delete this product?")){
    products.splice(i,1);
    localStorage.setItem("products", JSON.stringify(products));
    loadAdmin();
    showView("all");
  }
}

/* ADMIN LIST */
function loadAdmin(){
  let box = document.getElementById("adminList");
  box.innerHTML="";

  products.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="admin-item"
        draggable="true"
        ondragstart="dragStart(${i})"
        ondragover="event.preventDefault()"
        ondrop="dropItem(${i})">

        <img src="${p.image}">

        <div style="flex:1;">
          <b>${p.name}</b><br>
          <small>${p.category}</small>
        </div>

        <button class="delete-btn"
        onclick="deleteProduct(${i})">Delete</button>

      </div>
    `;
  });
}

/* INIT */
showView("all");

</script>

</body>
</html>
