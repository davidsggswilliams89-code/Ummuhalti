<!DOCTYPE html>
<html>
<head>
  <title>Ummuhalti Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f5f5f5;
      padding-top:80px;
    }

    /* HEADER */
    .top-marquee{
      background:#111;
      color:#fff;
      position:fixed;
      top:0;
      width:100%;
      height:40px;
      display:flex;
      align-items:center;
      overflow:hidden;
      z-index:3000;
      gap:10px;
    }

    .logo{
      height:28px;
      margin-left:10px;
      border-radius:6px;
    }

    .marquee-text{
      white-space:nowrap;
      animation:move 12s linear infinite;
      font-size:14px;
      padding-left:20px;
    }

    @keyframes move{
      0%{transform:translateX(0);}
      100%{transform:translateX(-100%);}
    }

    .admin-icon{
      position:absolute;
      right:10px;
      background:#25D366;
      padding:6px;
      border-radius:50%;
      cursor:pointer;
    }

    /* CATEGORY BAR */
    .category-bar{
      position:fixed;
      top:40px;
      width:100%;
      height:40px;
      background:#222;
      display:flex;
      align-items:center;
      overflow-x:auto;
    }

    .category-btn{
      color:#fff;
      padding:0 14px;
      cursor:pointer;
      white-space:nowrap;
      height:100%;
      display:flex;
      align-items:center;
      transition:0.3s;
    }

    .category-btn.active{
      background:#25D366;
      color:#fff;
      font-weight:bold;
      border-radius:5px;
    }

    /* VIEW */
    .view{ display:none; padding:10px; }
    .active-view{ display:block; }

    /* ABOUT */
    .about-box{
      background:#fff;
      border-radius:12px;
      padding:15px;
    }

    .link-btn{
      display:block;
      background:#25D366;
      color:white;
      padding:10px;
      margin:8px 0;
      border-radius:8px;
      text-decoration:none;
      text-align:center;
    }

    /* PRODUCTS */
    .carousel{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .card{
      background:#fff;
      border-radius:12px;
      padding:10px;
      position:relative;
    }

    .slides{
      display:flex;
      transition:0.3s;
    }

    .slides img{
      width:100%;
      flex-shrink:0;
      border-radius:10px;
    }

    .dots{
      text-align:center;
      margin-top:5px;
    }

    .dots span{
      width:8px;
      height:8px;
      background:#ccc;
      display:inline-block;
      margin:3px;
      border-radius:50%;
      cursor:pointer;
    }

    .price{
      background:#111;
      color:#fff;
      padding:10px;
      border-radius:10px;
      margin-top:8px;
      text-align:center;
    }

    .buy-btn{
      background:#25D366;
      color:#fff;
      border:none;
      width:100%;
      padding:12px;
      margin-top:8px;
      border-radius:25px;
      cursor:pointer;
    }

    .new-badge{
      position:absolute;
      top:10px;
      left:10px;
      background:red;
      color:white;
      padding:4px 6px;
      border-radius:5px;
      font-size:11px;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="top-marquee">

  <img src="YOUR_LOGO_URL_HERE" class="logo">

  <div class="marquee-text">
    ✨ Ummuhalti Collection ✨ Premium Fashion Store ✨
  </div>

  <div class="admin-icon" onclick="openAdmin()">🔐</div>
</div>

<!-- CATEGORY -->
<div class="category-bar">
  <div class="category-btn active" onclick="showView('about', this)">ABOUT US</div>
  <div class="category-btn" onclick="showView('kaftan', this)">KAFTAN</div>
  <div class="category-btn" onclick="showView('lace', this)">LACE</div>
  <div class="category-btn" onclick="showView('bags', this)">BAGS</div>
  <div class="category-btn" onclick="showView('shoes', this)">SHOES</div>
  <div class="category-btn" onclick="showView('abayas', this)">ABAYAS</div>
</div>

<!-- VIEWS -->
<div id="aboutView" class="view active-view">
  <div class="about-box">
    <h3>Ummuhalti Collection</h3>
    <p><b>Address:</b> Kano, Nigeria</p>

    <a class="link-btn" href="https://wa.me/2349114738932">💬 WhatsApp</a>
    <a class="link-btn" href="#">📱 WhatsApp Group</a>
    <a class="link-btn" href="#">🎵 TikTok</a>
    <a class="link-btn" href="#">📘 Facebook</a>
    <a class="link-btn" href="#">📸 Instagram</a>
  </div>
</div>

<div id="kaftanView" class="view"></div>
<div id="laceView" class="view"></div>
<div id="bagsView" class="view"></div>
<div id="shoesView" class="view"></div>
<div id="abayasView" class="view"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

/* SWITCH VIEW + ACTIVE BUTTON */
function showView(type, el){

  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active-view"));
  document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));

  el.classList.add("active");

  if(type==="about"){
    document.getElementById("aboutView").classList.add("active-view");
    return;
  }

  let data = products.filter(p=>p.category.toLowerCase()===type);

  let html='<div class="carousel">';

  data.forEach((p,i)=>{

    let isNew = Date.now()-p.date < 86400000;

    html+=`
    <div class="card">

      ${isNew ? '<div class="new-badge">NEW</div>' : ''}

      <div style="overflow:hidden">
        <div class="slides" id="s${i}">
          ${p.images.map(img=>`<img src="${img}">`).join("")}
        </div>
      </div>

      <div class="dots">
        ${p.images.map((_,d)=>`<span onclick="slide(${i},${d})"></span>`).join("")}
      </div>

      <h4>${p.name}</h4>
      <div class="price">₦${p.price}</div>

      <button class="buy-btn"
      onclick="buyNow('${p.name}','${p.price}','${p.images[0]}')">
      Buy Now</button>

    </div>`;
  });

  html+='</div>';

  let view = document.getElementById(type+"View");
  view.innerHTML = html;
  view.classList.add("active-view");
}

/* SLIDE */
function slide(i,d){
  document.getElementById("s"+i).style.transform =
  `translateX(-${d*100}%)`;
}

/* BUY */
function buyNow(name,price,img){
  let msg=`Hello, I want to order:\n${name}\n₦${price}\n${img}`;
  window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
}

/* ADMIN */
function openAdmin(){
  alert("Admin panel is in your full version");
}

</script>

</body>
</html>
