<!DOCTYPE html>
<html>
<head>
  <title>Ummuhalti Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    /* HEADER */
    .header {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111;
      color: white;
      padding: 10px;
      z-index: 1000;
    }

    .menu-icon {
      font-size: 24px;
      cursor: pointer;
    }

    /* MENU */
    .menu {
      display: none;
      flex-direction: column;
      background: #222;
    }

    .menu a {
      color: white;
      padding: 10px;
      text-decoration: none;
      border-bottom: 1px solid #333;
    }

    .show {
      display: flex;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 60px 20px;
      background: white;
    }

    /* PRODUCTS */
    .products {
      padding: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr; /* Single column */
      gap: 15px;
    }

    /* OPTIONAL: 2 columns on larger screens */
    @media(min-width: 600px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .img-box {
      position: relative;
    }

    .img-box img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.7);
      color: white;
      text-align: center;
      padding: 5px;
      font-weight: bold;
    }

    .btn {
      background: green;
      color: white;
      padding: 10px;
      border: none;
      width: 100%;
      margin-top: 5px;
      border-radius: 5px;
      font-size: 14px;
    }

    .section {
      background: white;
      margin-top: 10px;
      padding: 15px;
    }

    html {
      scroll-behavior: smooth;
    }

    .whatsapp {
      position: fixed;

      right: 20px;

      color: white;
