
<!DOCTYPE html>
<html>
<head>
  <title>BOB TEXTILE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ CLOUDINARY FIX -->
  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

  <style>
    body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:80px;}

    .top-marquee{
      background:#111;color:white;position:fixed;top:0;width:100%;height:40px;
      display:flex;align-items:center;z-index:3000;overflow:hidden;
    }

    .logo{height:28px;margin-left:10px;border-radius:6px;}

    .marquee-text{
      white-space:nowrap;animation:move 12s linear infinite;margin-left:10px;
    }

    @keyframes move{
      0%{transform:translateX(100%);}
      100%{transform:translateX(-100%);}
    }

    .admin-icon{
      position:absolute;right:10px;background:#25D366;padding:6px;
      border-radius:50%;cursor:pointer;
    }

    .category-bar{
      position:fixed;top:40px;width:100%;height:40px;background:#222;
      display:flex;align-items:center;overflow-x:auto;
    }

    .category-btn{
      color:white;padding:0 14px;white-space:nowrap;cursor:pointer;
    }

    .category-btn.active{
      background:#25D366;border-radius:5px;font-weight:bold;
    }

    .view{display:none;padding:10px;}
    .active-view{display:block;}

    .about-box{background:white;padding:15px;border-radius:12px;}

    .social-btn{
      display:flex;align-items:center;gap:10px;background:#25D366;
      color:white;text-decoration:none;padding:12px;border-radius:8px;margin:10px 0;
    }

    .social-btn img{width:22px;}

    .carousel{display:flex;flex-direction:column;gap:15px;}

    .card{
      background:white;border-radius:12px;padding:10px;position:relative;
    }

    .slides{display:flex;transition:0.3s;}
    .slides img{width:100%;flex-shrink:0;border-radius:10px;}

    .dots{text-align:center;margin-top:5px;}

    .new-badge{
      position:absolute;top:10px;left:10px;background:red;color:white;
      padding:4px 6px;border-radius:5px;font-size:11px;
    }

    .price{
      background:#111;color:white;text-align:center;
      padding:10px;border-radius:10px;margin-top:8px;
    }

    .buy-btn{
      background:#25D366;color:white;border:none;width:100%;
      padding:12px;margin-top:8px;border-radius:25px;cursor:pointer;
    }

    .admin{
      display:none;position:fixed;top:0;width:100%;height:100%;
      background:white;z-index:4000;padding:15px;overflow:auto;
    }

    input,select{width:100%;padding:10px;margin:5px 0;}

    .btn{
      background:green;color:white;border:none;width:100%;
      padding:10px;border-radius:6px;margin-top:6px;
    }

    .preview{display:flex;gap:10px;flex-wrap:wrap;}

    .preview img{
      width:70px;height:70px;object-fit:cover;border-radius:6px;
    }

    .admin-item{
      display:flex;gap:10px;align-items:center;
      background:#eee;padding:8px;border-radius:6px;margin:5px 0;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="top-marquee">
  <img src="YOUR_LOGO_URL_HERE" class="logo">
  <div class="marquee-text">✨ BOB TEXTILE ✨ Premium Fashion Store ✨</div>
  <div class="admin-icon" onclick="openAdmin()">🔐</div>
</div>

<!-- CATEGORY -->
<div class="category-bar">
  <div class="category-btn active" onclick="showView('about',this)">ABOUT US</div>
  <div class="category-btn" onclick="showView('kaftan',this)">KAFTAN</div>
  <div class="category-btn" onclick="showView('lace',this)">LACE</div>
  <div class="category-btn" onclick="showView('bags',this)">BAGS</div>
  <div class="category-btn" onclick="showView('shoes',this)">SHOES</div>
  <div class="category-btn" onclick="showView('abayas',this)">ABAYAS</div>
</div>

<!-- ABOUT -->
<div id="aboutView" class="view active-view">
  <div class="about-box">
    <h3>BOB TEXTILE</h3>
    <p>Kano, Nigeria</p>

    <a class="social-btn" href="https://wa.me/2349114738932">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"> WhatsApp
    </a>

    <a class="social-btn" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"> Facebook
    </a>

    <a class="social-btn" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"> Instagram
    </a>

    <a class="social-btn" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"> TikTok
    </a>

  </div>
</div>

<div id="kaftanView" class="view"></div>
<div id="laceView" class="view"></div>
<div id="bagsView" class="view"></div>
<div id="shoesView" class="view"></div>
<div id="abayasView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="adminPanel">

  <input id="aName" placeholder="Product Name">
  <input id="aPrice" placeholder="Price">

  <!-- ✅ FIXED CATEGORY VALUES -->
  <select id="aCategory">
    <option value="kaftan">Kaftan</option>
    <option value="lace">Lace</option>
    <option value="bags">Bags</option>
    <option value="shoes">Shoes</option>
    <option value="abayas">Abayas</option>
  </select>

  <button class="btn" onclick="uploadImage()">Upload Images</button>
  <div class="preview" id="previewBox"></div>

  <button class="btn" onclick="addProduct()">Save Product</button>

  <hr>

  <div id="adminList"></div>

  <button class="btn" onclick="closeAdmin()">Close</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let uploadedImages = [];

/* VIEW */
function showView(type,el){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active-view"));
  document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  if(type==="about"){
    aboutView.classList.add("active-view");
    return;
  }

  let list = products.filter(p => p.category === type);

  let html = '<div class="carousel">';

  list.forEach((p,i)=>{

    let isNew = Date.now()-p.date < 86400000;

    html += `
    <div class="card">
      ${isNew?'<div class="new-badge">NEW</div>':''}

      <div class="slides" id="slide${i}">
        ${p.images.map(img=>`<img src="${img}">`).join('')}
      </div>

      <h4>${p.name}</h4>
      <div class="price">₦${p.price}</div>

      <button class="buy-btn"
        onclick="buyNow('${p.name}','${p.price}','${p.images[0]}')">
        Buy Now
      </button>
    </div>`;
  });

  html += '</div>';

  document.getElementById(type+"View").innerHTML = html;
  document.getElementById(type+"View").classList.add("active-view");
}

/* BUY */
function buyNow(name,price,img){
  let msg=`Hello, I want to order:\n${name}\n₦${price}\n${img}`;
  window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
}

/* ADMIN */
function openAdmin(){
  if(prompt("Password")==="1234"){
    adminPanel.style.display="block";
    loadAdmin();
  }
}

function closeAdmin(){
  adminPanel.style.display="none";
}

/* UPLOAD FIXED */
function uploadImage(){
  cloudinary.openUploadWidget({
    cloudName:"db92r6j9z",
    uploadPreset:"ummuhalti",
    multiple:true
  }, (error,result)=>{
    if(result && result.event==="success"){
      uploadedImages.push(result.info.secure_url);
      renderPreview();
    }
  });
}

function renderPreview(){
  previewBox.innerHTML="";
  uploadedImages.forEach(img=>{
    previewBox.innerHTML += `<img src="${img}">`;
  });
}

/* ADD PRODUCT FIX */
function addProduct(){
  if(uploadedImages.length===0) return alert("Upload images");

  products.unshift({
    name:aName.value,
    price:aPrice.value,
    category:aCategory.value,
    images:[...uploadedImages],
    date:Date.now()
  });

  localStorage.setItem("products", JSON.stringify(products));

  uploadedImages=[];
  renderPreview();

  let active = document.querySelector(".category-btn.active");
  if(active) active.click();

  loadAdmin();
}

/* ADMIN LIST */
function loadAdmin(){
  adminList.innerHTML="";
  products.forEach((p,i)=>{
    adminList.innerHTML += `
    <div class="admin-item">
      <img src="${p.images[0]}" width="50">
      <div style="flex:1">${p.name}</div>
      <button onclick="deleteProduct(${i})">Delete</button>
    </div>`;
  });
}

function deleteProduct(i){
  if(confirm("Delete?")){
    products.splice(i,1);
    localStorage.setItem("products", JSON.stringify(products));
    loadAdmin();
  }
}

</script>

</body>
</html>
