<!DOCTYPE html>
<html>
<head>
  <title>BOB TEXTILE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  padding-top:80px;
}

/* HEADER FIX (TEXT BEHIND LOGO) */
.top-marquee{
  background:#111;
  position:fixed;
  top:0;
  width:100%;
  height:45px;
  display:flex;
  align-items:center;
  overflow:hidden;
  z-index:3000;
}

.logo{
  height:45px;
  z-index:10;
  position:relative;
  background:#111;
}

.marquee-wrapper{
  position:absolute;
  width:100%;
  overflow:hidden;
  z-index:1; /* BEHIND LOGO */
}

.marquee-text{
  white-space:nowrap;
  animation:move 12s linear infinite;
  margin-left:120px;
  color:white;
}

@keyframes move{
  0%{transform:translateX(100%);}
  100%{transform:translateX(-100%);}
}

.admin-icon{
  position:absolute;
  right:0;
  width:45px;
  height:45px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  z-index:10;
}

/* CATEGORY */
.category-bar{
  position:fixed;
  top:45px;
  width:100%;
  height:40px;
  background:#222;
  display:flex;
  overflow-x:auto;
  z-index:2000;
}

.category-btn{
  color:white;
  padding:6px 14px;
  margin:5px;
  border-radius:20px;
  white-space:nowrap;
  cursor:pointer;
}

.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}
.active-view{display:block;}

/* CARD */
.card{
  background:white;
  border-radius:14px;
  padding:10px;
  margin-bottom:15px;
}

/* CAROUSEL */
.carousel{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.carousel img{
  min-width:100%;
  height:380px;
  object-fit:contain;
  scroll-snap-align:center;
}

.carousel::-webkit-scrollbar{display:none;}

/* DOTS */
.dots{text-align:center;margin-top:5px;}
.dot{
  height:8px;width:8px;
  margin:0 3px;
  background:#bbb;
  border-radius:50%;
  display:inline-block;
}
.dot.active{background:#000;}

/* PRICE */
.price{
  background:#111;
  color:white;
  text-align:center;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

/* BUY */
.buy-btn{
  background:#25D366;
  color:white;
  border:none;
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  font-weight:bold;
}

/* ADMIN */
.admin{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  z-index:5000;
  padding:15px;
  overflow:auto;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.btn{
  width:100%;
  padding:10px;
  background:green;
  color:white;
  border:none;
  margin-top:5px;
}

/* EDIT PANEL */
.edit-box{
  background:#f2f2f2;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top-marquee">
  <img src="logo.jpeg" class="logo">

  <div class="marquee-wrapper">
    <div class="marquee-text">
      ✨ BOB TEXTILE ✨ Premium Fashion Store ✨ Quality Fabrics ✨
    </div>
  </div>

  <div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY -->
<div class="category-bar">
  <div class="category-btn" onclick="showView('about',this)">ABOUT</div>
  <div class="category-btn" onclick="showView('shadda',this)">SHADDA</div>
  <div class="category-btn" onclick="showView('bags',this)">BAGS</div>
  <div class="category-btn" onclick="showView('shoes',this)">SHOES</div>
  <div class="category-btn" onclick="showView('abayas',this)">ABAYAS</div>
  <div class="category-btn" onclick="showView('yard',this)">YARD</div>
  <div class="category-btn" onclick="showView('caps',this)">CAPS</div>
  <div class="category-btn" onclick="showView('vail',this)">VAIL</div>
</div>

<!-- VIEWS -->
<div id="aboutView" class="view active-view">
  <div class="card">Welcome to BOB TEXTILE</div>
</div>

<div id="shaddaView" class="view"></div>
<div id="bagsView" class="view"></div>
<div id="shoesView" class="view"></div>
<div id="abayasView" class="view"></div>
<div id="yardView" class="view"></div>
<div id="capsView" class="view"></div>
<div id="vailView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="adminPanel">

<h3>Admin Panel</h3>

<input id="aName" placeholder="Product Name">
<input id="aPrice" placeholder="Price">

<select id="aCategory">
  <option value="shadda">SHADDA</option>
  <option value="bags">BAGS</option>
  <option value="shoes">SHOES</option>
  <option value="abayas">ABAYAS</option>
  <option value="yard">YARD</option>
  <option value="caps">CAPS</option>
  <option value="vail">VAIL</option>
</select>

<button class="btn" onclick="uploadImage()">Upload Images</button>
<button class="btn" onclick="addProduct()">Save Product</button>

<hr>

<h3>Edit Product</h3>
<div id="editList"></div>

<input id="editName" placeholder="Edit Name">
<input id="editPrice" placeholder="Edit Price">
<button class="btn" onclick="saveEdit()">Update</button>

</div>

<script>

let products=JSON.parse(localStorage.getItem("products"))||[];
let uploadedImages=[];
let editIndex=null;

/* VIEW */
function showView(type,el){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active-view"));
  document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));

  el.classList.add("active");
  localStorage.setItem("activeView",type);

  if(type==="about"){
    aboutView.classList.add("active-view");
    return;
  }

  let list=products.filter(p=>p.category===type);
  let html="";

  list.forEach((p,i)=>{
    let isNew=(Date.now()-p.date)<86400000;

    html+=`
    <div class="card">

      <div class="carousel car${type}${i}">
        ${p.images.map(img=>`<img src="${img}">`).join('')}
      </div>

      <div class="dots dots${type}${i}"></div>

      <div class="price">₦ ${p.price}</div>

      <button class="buy-btn" onclick="buyNow(${i},'${type}')">
        🟢 BUY NOW
      </button>

      <button class="btn" onclick="startEdit(${i},'${type}')">EDIT</button>

    </div>`;
  });

  document.getElementById(type+"View").innerHTML=html;
  document.getElementById(type+"View").classList.add("active-view");

  list.forEach((p,i)=>setupCarousel(type,i));
}

/* BUY NOW (LIVE IMAGE) */
function buyNow(i,type){
  let list=products.filter(p=>p.category===type);
  let p=list[i];

  let car=document.querySelector(".car"+type+i);
  let index=Math.round(car.scrollLeft/car.clientWidth);
  let img=p.images[index];

  let msg=`Hello 👋
I want to order:

Product: ${p.name}
Price: ₦${p.price}
Image: ${img}

Is it available?`;

  window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
}

/* CAROUSEL */
function setupCarousel(type,i){
  let c=document.querySelector(".car"+type+i);
  let box=document.querySelector(".dots"+type+i);
  if(!c)return;

  let imgs=c.querySelectorAll("img");
  box.innerHTML="";

  imgs.forEach((_,x)=>{
    let d=document.createElement("span");
    d.className="dot";
    if(x===0)d.classList.add("active");
    box.appendChild(d);
  });

  let dots=box.querySelectorAll(".dot");

  c.addEventListener("scroll",()=>{
    let index=Math.round(c.scrollLeft/c.clientWidth);
    dots.forEach(d=>d.classList.remove("active"));
    if(dots[index])dots[index].classList.add("active");
  });
}

/* ADMIN */
function openAdmin(){
  if(prompt("Password")==="1234"){
    adminPanel.style.display="block";
  }
}

/* UPLOAD */
function uploadImage(){
  cloudinary.openUploadWidget({
    cloudName:"db92r6j9z",
    uploadPreset:"ummuhalti",
    multiple:true
  },(e,r)=>{
    if(r&&r.event==="success"){
      uploadedImages.push(r.info.secure_url);
    }
  });
}

/* SAVE */
function addProduct(){
  products.unshift({
    name:aName.value,
    price:aPrice.value,
    category:aCategory.value,
    images:[...uploadedImages],
    date:Date.now()
  });

  localStorage.setItem("products",JSON.stringify(products));
  uploadedImages=[];
}

/* EDIT */
function startEdit(i,type){
  let list=products.filter(p=>p.category===type);
  editIndex=products.indexOf(list[i]);

  editName.value=list[i].name;
  editPrice.value=list[i].price;
}

function saveEdit(){
  if(editIndex==null)return;

  products[editIndex].name=editName.value;
  products[editIndex].price=editPrice.value;

  localStorage.setItem("products",JSON.stringify(products));
  alert("Updated!");
}

</script>

</body>
</html>
