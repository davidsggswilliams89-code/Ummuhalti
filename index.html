<!DOCTYPE html>
<html>
<head>
  <title>BOB TEXTILE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  padding-top:80px;
}

/* HEADER */
.top-marquee{
  background:#111;
  position:fixed;
  top:0;
  width:100%;
  height:45px;
  display:flex;
  align-items:center;
  overflow:hidden;
  z-index:3000;
}

.logo{
  height:45px;
  margin:0;
  padding:0;
  object-fit:cover;
}

.marquee-wrapper{
  position:absolute;
  width:100%;
  overflow:hidden;
}

.marquee-text{
  white-space:nowrap;
  animation:move 12s linear infinite;
  color:white;
  margin-left:120px;
}

@keyframes move{
  0%{transform:translateX(100%);}
  100%{transform:translateX(-100%);}
}

.admin-icon{
  position:absolute;
  right:0;
  width:45px;
  height:45px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
}

/* CATEGORY */
.category-bar{
  position:fixed;
  top:45px;
  width:100%;
  height:40px;
  background:#222;
  display:flex;
  overflow-x:auto;
  z-index:2000;
}

.category-btn{
  color:white;
  padding:6px 14px;
  margin:5px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}
.active-view{display:block;}

/* CARD */
.card{
  background:white;
  border-radius:14px;
  padding:10px;
  margin-bottom:15px;
}

/* IMAGE */
.carousel{
  position:relative;
}

.carousel img{
  width:100%;
  height:380px;
  object-fit:contain;
  background:white;
}

/* NEW BADGE */
.new-badge{
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:white;
  padding:5px 8px;
  font-size:12px;
  border-radius:5px;
}

/* PRICE */
.price{
  background:#111;
  color:white;
  text-align:center;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

/* BUTTON */
.buy-btn{
  background:#25D366;
  color:white;
  border:none;
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.edit-btn{
  width:100%;
  padding:8px;
  background:#444;
  color:white;
  border:none;
  margin-top:5px;
}

.delete-btn{
  width:100%;
  padding:8px;
  background:red;
  color:white;
  border:none;
  margin-top:5px;
}

/* ADMIN */
.admin{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  z-index:5000;
  padding:15px;
  overflow:auto;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.btn{
  width:100%;
  padding:10px;
  background:green;
  color:white;
  border:none;
  margin-top:5px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top-marquee">
  <img src="logo.jpeg" class="logo">

  <div class="marquee-wrapper">
    <div class="marquee-text">
      ✨ BOB TEXTILE ✨ Premium Fashion Store ✨ Quality Fabrics ✨
    </div>
  </div>

  <div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY -->
<div class="category-bar">
  <div class="category-btn" onclick="showView('about',this)">ABOUT</div>
  <div class="category-btn" onclick="showView('shadda',this)">SHADDA</div>
  <div class="category-btn" onclick="showView('bags',this)">BAGS</div>
  <div class="category-btn" onclick="showView('yards',this)">YARDS</div>
  <div class="category-btn" onclick="showView('caps',this)">CAPS</div>
  <div class="category-btn" onclick="showView('shoes',this)">SHOES</div>
</div>

<!-- VIEWS -->
<div id="aboutView" class="view active-view"></div>
<div id="shaddaView" class="view"></div>
<div id="bagsView" class="view"></div>
<div id="yardsView" class="view"></div>
<div id="capsView" class="view"></div>
<div id="shoesView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="adminPanel">

<h3>Admin Panel</h3>

<input id="aName" placeholder="Product Name">
<input id="aPrice" placeholder="Price">

<select id="aCategory">
  <option value="shadda">SHADDA</option>
  <option value="bags">BAGS</option>
  <option value="yards">YARDS</option>
  <option value="caps">CAPS</option>
  <option value="shoes">SHOES</option>
</select>

<button class="btn" onclick="uploadImage()">Upload Image</button>
<button class="btn" onclick="addProduct()">Save Product</button>

<button class="btn" style="background:red;" onclick="closeAdmin()">Close</button>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let activeImage = "";

/* TAB SYSTEM */
function showView(view,el){
  localStorage.setItem("activeTab",view);

  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active-view"));
  document.getElementById(view+"View").classList.add("active-view");

  document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

/* RESTORE TAB */
window.onload=function(){
  loadProducts();
  let last = localStorage.getItem("activeTab");
  if(last){
    let btn=[...document.querySelectorAll(".category-btn")]
      .find(b=>b.innerText.toLowerCase()==last);
    if(btn) btn.click();
  }
};

/* UPLOAD IMAGE */
function uploadImage(){
  cloudinary.openUploadWidget({
    cloudName:"db92r6j9z",
    uploadPreset:"ummuhalti",
    multiple:false
  },(e,r)=>{
    if(r && r.event==="success"){
      activeImage = r.info.secure_url;
      alert("Image uploaded ✔");
    }
  });
}

/* ADD PRODUCT */
function addProduct(){
  if(!activeImage){
    alert("Upload image first ❗");
    return;
  }

  let p={
    name:aName.value,
    price:aPrice.value,
    category:aCategory.value,
    image:activeImage,
    time:Date.now()
  };

  products.push(p);
  localStorage.setItem("products",JSON.stringify(products));

  activeImage="";
  aName.value="";
  aPrice.value="";

  loadProducts();
}

/* RENDER */
function loadProducts(){
  ["shadda","bags","yards","caps","shoes"].forEach(c=>{
    document.getElementById(c+"View").innerHTML="";
  });

  products.forEach((p,i)=>{
    let isNew = (Date.now()-p.time)<86400000;

    let html=`
      <div class="card">
        <div class="carousel">
          ${isNew?'<div class="new-badge">NEW</div>':''}
          <img src="${p.image || ''}">
        </div>

        <h3>${p.name}</h3>
        <div class="price">${p.price}</div>

        <button class="buy-btn" onclick="buy('${p.name}','${p.price}','${p.image}')">
          BUY ON WHATSAPP
        </button>

        <button class="edit-btn" onclick="editProduct(${i})">Edit</button>
        <button class="delete-btn" onclick="deleteProduct(${i})">Delete</button>
      </div>
    `;

    document.getElementById(p.category+"View").innerHTML += html;
  });
}

/* WHATSAPP */
function buy(name,price,img){
  let msg=`Hello, I want:%0AProduct: ${name}%0APrice: ${price}%0AImage: ${img}%0AIs it available?`;
  window.open(`https://wa.me/2349114738932?text=${msg}`);
}

/* DELETE */
function deleteProduct(i){
  products.splice(i,1);
  localStorage.setItem("products",JSON.stringify(products));
  loadProducts();
}

/* EDIT */
function editProduct(i){
  let p=products[i];
  aName.value=p.name;
  aPrice.value=p.price;
  aCategory.value=p.category;
  activeImage=p.image;

  products.splice(i,1);
  loadProducts();
}

/* ADMIN */
function openAdmin(){
  if(prompt("Password")=="1234"){
    adminPanel.style.display="block";
  }
}

function closeAdmin(){
  adminPanel.style.display="none";
}

</script>

</body>
</html>
