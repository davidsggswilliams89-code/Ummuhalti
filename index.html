<!DOCTYPE html>
<html>
<head>
  <title>Ummuhalti Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

  <style>
    body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:80px;}

    .top-marquee{
      background:#111;color:#fff;position:fixed;top:0;width:100%;
      height:40px;display:flex;align-items:center;padding:0 10px;z-index:999;
    }

    .admin-icon{
      position:absolute;right:10px;background:#25D366;
      padding:6px;border-radius:50%;cursor:pointer;
    }

    .category-bar{
      position:fixed;top:40px;width:100%;height:40px;
      background:#222;display:flex;align-items:center;overflow-x:auto;
    }

    .category-bar div{color:#fff;padding:0 12px;cursor:pointer;}

    .carousel{display:flex;flex-direction:column;gap:15px;padding:10px;}

    .card{
      background:#fff;border-radius:12px;padding:10px;
      box-shadow:0 3px 10px rgba(0,0,0,0.1);
    }

    .slider{overflow:hidden;}
    .slides{display:flex;transition:0.3s;}

    .slides img{
      width:100%;flex-shrink:0;border-radius:10px;
    }

    .dots{text-align:center;margin-top:5px;}
    .dots span{
      width:8px;height:8px;background:#ccc;
      display:inline-block;margin:3px;border-radius:50%;
      cursor:pointer;
    }

    .price{
      background:#111;color:#fff;padding:10px;
      border-radius:10px;margin-top:8px;text-align:center;
    }

    .buy-btn{
      background:#25D366;color:#fff;border:none;
      width:100%;padding:12px;margin-top:8px;
      border-radius:25px;cursor:pointer;
    }

    /* ADMIN */
    .admin{
      display:none;position:fixed;top:0;width:100%;
      height:100%;background:#fff;z-index:2000;padding:15px;overflow:auto;
    }

    input,select{width:100%;padding:10px;margin:5px 0;}

    .btn{
      background:green;color:#fff;border:none;
      width:100%;padding:10px;margin-top:5px;border-radius:6px;
    }

    /* PREVIEW */
    .preview-box{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}

    .preview-item{position:relative;}

    .preview-item img{
      width:70px;height:70px;object-fit:cover;border-radius:6px;
    }

    .remove-btn{
      position:absolute;top:-5px;right:-5px;
      background:red;color:#fff;border-radius:50%;
      padding:2px 6px;font-size:12px;cursor:pointer;
    }

  </style>
</head>

<body>

<div class="top-marquee">
  Ummuhalti Collection
  <div class="admin-icon" onclick="openAdmin()">🔐</div>
</div>

<div class="category-bar">
  <div onclick="showView('all')">ALL</div>
  <div onclick="showView('kaftan')">KAFTAN</div>
</div>

<div id="allView"></div>

<!-- ADMIN -->
<div class="admin" id="adminPanel">

  <h3>Add Product</h3>

  <input id="aName" placeholder="Product Name">
  <input id="aPrice" placeholder="Price">

  <select id="aCategory">
    <option>Kaftan</option>
    <option>Lace</option>
  </select>

  <button class="btn" onclick="uploadImage()">Upload Images</button>
  <p id="status">No images</p>

  <!-- PREVIEW -->
  <div class="preview-box" id="previewBox"></div>

  <button class="btn" onclick="addProduct()">Add Product</button>
  <button class="btn" onclick="closeAdmin()">Close</button>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let uploadedImages = [];

/* UPLOAD */
function uploadImage(){
  cloudinary.openUploadWidget({
    cloudName:"db92r6j9z",
    uploadPreset:"ummuhalti",
    multiple:true
  },
  function(error,result){
    if(result && result.event==="success"){
      uploadedImages.push(result.info.secure_url);
      renderPreview();
      status.innerText = uploadedImages.length + " images uploaded";
    }
  });
}

/* PREVIEW */
function renderPreview(){
  let box = document.getElementById("previewBox");
  box.innerHTML = "";

  uploadedImages.forEach((img,i)=>{
    box.innerHTML += `
      <div class="preview-item">
        <img src="${img}">
        <div class="remove-btn" onclick="removeImage(${i})">×</div>
      </div>`;
  });
}

/* REMOVE IMAGE */
function removeImage(i){
  uploadedImages.splice(i,1);
  renderPreview();
  status.innerText = uploadedImages.length + " images uploaded";
}

/* ADD PRODUCT */
function addProduct(){

  if(uploadedImages.length===0){
    alert("Upload images first");
    return;
  }

  products.unshift({
    name:aName.value,
    price:aPrice.value,
    category:aCategory.value,
    images:[...uploadedImages]
  });

  localStorage.setItem("products",JSON.stringify(products));

  uploadedImages=[];
  renderPreview();
  status.innerText="No images";

  showView("all");
}

/* DISPLAY */
function showView(type){

  let html='<div class="carousel">';

  products.forEach((p,i)=>{

    let imgs = p.images || [p.image];

    html+=`
      <div class="card">

        <div class="slider">
          <div class="slides" id="s${i}">
            ${imgs.map(img=>`<img src="${img}">`).join("")}
          </div>
        </div>

        <div class="dots">
          ${imgs.map((_,d)=>`<span onclick="slide(${i},${d})"></span>`).join("")}
        </div>

        <h4>${p.name}</h4>
        <div class="price">₦${p.price}</div>

        <button class="buy-btn"
        onclick="buyNow('${p.name}','${p.price}','${imgs[0]}')">
        Buy Now</button>

      </div>`;
  });

  html+='</div>';
  document.getElementById("allView").innerHTML=html;
}

/* SLIDE */
function slide(i,d){
  document.getElementById("s"+i).style.transform =
  `translateX(-${d*100}%)`;
}

/* BUY */
function buyNow(name,price,img){
  let msg=`Order:\n${name}\n₦${price}\n${img}`;
  window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
}

/* ADMIN */
function openAdmin(){
  if(prompt("Password")==="1234"){
    adminPanel.style.display="block";
  }
}

function closeAdmin(){
  adminPanel.style.display="none";
}

showView("all");

</script>

</body>
</html>
