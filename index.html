<!DOCTYPE html>
<html>
<head>
  <title>SWEN STORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111;
      color: white;
      padding: 10px;
    }

    .logo {
      font-weight: bold;
    }

    .menu-icon {
      font-size: 24px;
      cursor: pointer;
    }

    /* MENU */
    .menu {
      display: none;
      flex-direction: column;
      background: #222;
    }

    .menu a {
      color: white;
      padding: 10px;
      text-decoration: none;
      border-bottom: 1px solid #333;
    }

    .menu a:hover {
      background: #333;
    }

    .show {
      display: flex;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 40px 20px;
      background: white;
    }

    /* PRODUCTS */
    .products {
      padding: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .img-box {
      position: relative;
    }

    .img-box img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.7);
      color: white;
      text-align: center;
    }

    .btn {
      background: green;
      color: white;
      padding: 8px;
      border: none;
      width: 100%;
      margin-top: 5px;
      border-radius: 5px;
    }

    .section {
      background: white;
      margin-top: 10px;
      padding: 15px;
    }

    html {
      scroll-behavior: smooth;
    }

    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: green;
      color: white;
      padding: 12px;
      border-radius: 50%;
      text-decoration: none;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">SWEN</div>
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <a href="#home">Home</a>
  <a href="#products">Products</a>
  <a href="#about">About</a>
  <a href="#contact">Contact</a>
</div>

<!-- HERO -->
<section id="home" class="hero">
  <h1>Quality Fashion for You</h1>
  <p>Order easily via WhatsApp</p>
</section>

<!-- PRODUCTS -->
<section id="products" class="products">
  <h3>Products</h3>
  <div class="grid" id="productList"></div>
</section>

<!-- ABOUT -->
<section id="about" class="section">
  <h3>About Us</h3>
  <p>We provide quality fashion at affordable prices. Fast delivery and trusted service.</p>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <h3>Contact</h3>
  <button class="btn" onclick="contact()">Chat on WhatsApp</button>
</section>

<!-- FLOAT BUTTON -->
<a href="https://wa.me/2348012345678" class="whatsapp">💬</a>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [
  {
    name:"Kaftan",
    code:"SWEN-001",
    price:"₦5000",
    image:"kaftan.jpg"
  },
  {
    name:"Shoes",
    code:"SWEN-002",
    price:"₦8000",
    image:"kaftan.jpg"
  }
];

function displayProducts(){
  let box = document.getElementById("productList");
  box.innerHTML = "";

  products.forEach(p=>{
    box.innerHTML += `
      <div class="card">
        <div class="img-box">
          <img src="${p.image}">
          <div class="price">${p.price}</div>
        </div>
        <h4>${p.name}</h4>
        <p>${p.code}</p>
        <button class="btn" onclick="order('${p.name}','${p.code}','${p.price}')">
          Order
        </button>
      </div>
    `;
  });
}

function order(name,code,price){
  let msg = `Hello, I want to order:\n${name}\n${code}\n${price}`;
  window.open(`https://wa.me/2348012345678?text=${encodeURIComponent(msg)}`);
}

function contact(){
  window.open("https://wa.me/2348012345678");
}

/* BURGER MENU */
function toggleMenu(){
  let menu = document.getElementById("menu");
  menu.classList.toggle("show");
}

displayProducts();
</script>

</body>
</html>
