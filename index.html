<!DOCTYPE html>
<html>
<head>
  <title>BOB TEXTILE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  padding-top:80px;
}

/* HEADER */
.top-marquee{
  background:#111;
  position:fixed;
  top:0;
  width:100%;
  height:45px;
  display:flex;
  align-items:center;
  overflow:hidden;
  z-index:3000;
}

.logo{
  height:45px;
}

.marquee-wrapper{
  position:absolute;
  width:100%;
  overflow:hidden;
}

.marquee-text{
  white-space:nowrap;
  animation:move 12s linear infinite;
  color:white;
  margin-left:120px;
}

@keyframes move{
  0%{transform:translateX(100%);}
  100%{transform:translateX(-100%);}
}

.admin-icon{
  position:absolute;
  right:0;
  width:45px;
  height:45px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
}

/* CATEGORY */
.category-bar{
  position:fixed;
  top:45px;
  width:100%;
  height:40px;
  background:#222;
  display:flex;
  overflow-x:auto;
  z-index:2000;
}

.category-btn{
  color:white;
  padding:6px 14px;
  margin:5px;
  border-radius:20px;
  cursor:pointer;
}

.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}
.active-view{display:block;}

/* CARD */
.card{
  background:white;
  border-radius:14px;
  padding:10px;
  margin-bottom:15px;
}

/* CAROUSEL */
.carousel{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.carousel img{
  min-width:100%;
  height:350px;
  object-fit:contain;
  scroll-snap-align:center;
  background:white;
}

.carousel::-webkit-scrollbar{display:none;}

/* DOTS */
.dots{
  text-align:center;
  margin-top:5px;
}

.dot{
  height:8px;
  width:8px;
  margin:0 3px;
  background:#bbb;
  border-radius:50%;
  display:inline-block;
}

.dot.active{background:#000;}

/* PRICE */
.price{
  background:#111;
  color:white;
  text-align:center;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

/* BUY BUTTON */
.buy-btn{
  background:#25D366;
  color:white;
  border:none;
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  cursor:pointer;
}

.buy-btn img{width:20px;}

/* ADMIN */
.admin{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  z-index:5000;
  padding:15px;
  overflow:auto;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.btn{
  width:100%;
  padding:10px;
  background:green;
  color:white;
  border:none;
  margin-top:5px;
}

.admin-item{
  display:flex;
  gap:10px;
  align-items:center;
  background:#f2f2f2;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
}

.delete-btn{
  background:red;
  color:white;
  border:none;
  padding:6px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top-marquee">
  <img src="logo.jpeg" class="logo">

  <div class="marquee-wrapper">
    <div class="marquee-text">✨ BOB TEXTILE ✨ Premium Fashion Store ✨</div>
  </div>

  <div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY -->
<div class="category-bar">
  <div class="category-btn active" onclick="showProducts('shadda',this)">SHADDA</div>
  <div class="category-btn" onclick="showProducts('bags',this)">BAGS</div>
  <div class="category-btn" onclick="showProducts('shoes',this)">SHOES</div>
  <div class="category-btn" onclick="showProducts('abayas',this)">ABAYAS</div>
  <div class="category-btn" onclick="showProducts('yard',this)">YARD</div>
  <div class="category-btn" onclick="showProducts('caps',this)">CAPS</div>
  <div class="category-btn" onclick="showProducts('vail',this)">VAIL</div>
</div>

<!-- ABOUT -->
<div id="aboutView" class="view active-view">
  <div class="card">
    <h2 style="text-align:center;">🧵 BOB TEXTILE</h2>
    <p style="text-align:center;">Premium fabrics • Modern fashion • Trusted quality</p>
  </div>
</div>

<!-- PRODUCT VIEWS -->
<div id="shaddaView" class="view"></div>
<div id="bagsView" class="view"></div>
<div id="shoesView" class="view"></div>
<div id="abayasView" class="view"></div>
<div id="yardView" class="view"></div>
<div id="capsView" class="view"></div>
<div id="vailView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="adminPanel">

<h3>Admin Panel</h3>

<input id="aName" placeholder="Product Name">
<input id="aPrice" placeholder="Price">

<select id="aCategory">
<option>shadda</option>
<option>bags</option>
<option>shoes</option>
<option>abayas</option>
<option>yard</option>
<option>caps</option>
<option>vail</option>
</select>

<button class="btn" onclick="uploadImage()">Upload Images</button>
<button class="btn" onclick="addProduct()">Save Product</button>

<hr>

<div id="adminList"></div>

<button class="btn" onclick="closeAdmin()" style="background:red;">Close</button>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products"))||[];
let uploadedImages=[];

/* SHOW PRODUCTS */
function showProducts(type,el){

document.querySelectorAll(".view").forEach(v=>v.classList.remove("active-view"));
document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));

el.classList.add("active");

if(type==="about"){
document.getElementById("aboutView").classList.add("active-view");
return;
}

let list = products.filter(p=>p.category===type);
let html="";

list.forEach((p,i)=>{
html+=`
<div class="card">

<div class="carousel car${type}${i}">
${(p.images||[]).map(img=>`<img src="${img}">`).join("")}
</div>

<div class="dots dots${type}${i}"></div>

<div class="price">₦ ${p.price}</div>

<button class="buy-btn" onclick="buyNow('${type}',${i})">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
BUY NOW
</button>

</div>`;
});

document.getElementById(type+"View").innerHTML=html;
document.getElementById(type+"View").classList.add("active-view");

list.forEach((p,i)=>setupCarousel(type,i));
}

/* CAROUSEL */
function setupCarousel(type,i){

let c=document.querySelector(".car"+type+i);
let box=document.querySelector(".dots"+type+i);

if(!c||!box)return;

let imgs=c.querySelectorAll("img");
box.innerHTML="";

imgs.forEach((_,x)=>{
let d=document.createElement("span");
d.className="dot";
if(x===0)d.classList.add("active");
box.appendChild(d);
});

let dots=box.querySelectorAll(".dot");

c.addEventListener("scroll",()=>{
let index=Math.round(c.scrollLeft/c.clientWidth);
dots.forEach(d=>d.classList.remove("active"));
if(dots[index])dots[index].classList.add("active");
});
}

/* WHATSAPP BUY */
function buyNow(type,i){

let list = products.filter(p=>p.category===type);
let p = list[i];

let car=document.querySelector(".car"+type+i);
let index=0;

if(car){
index=Math.round(car.scrollLeft/car.clientWidth);
}

let img = p.images?.[index] || "";

let msg =
`Hello 👋,

I want to order from BOB TEXTILE:

🧵 Category: ${type.toUpperCase()}
🛍️ Product: ${p.name}
💰 Price: ₦${p.price}

🖼️ Selected Image:
${img}

Is this available? I want to buy.`;

window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
}

/* ADMIN */
function openAdmin(){
if(prompt("Password")==="1234"){
adminPanel.style.display="block";
renderAdmin();
}
}

function closeAdmin(){
adminPanel.style.display="none";
}

/* UPLOAD */
function uploadImage(){
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
multiple:true
},(e,r)=>{
if(r.event==="success"){
uploadedImages.push(r.info.secure_url);
}
});
}

/* SAVE */
function addProduct(){

products.unshift({
id:Date.now(),
name:aName.value,
price:aPrice.value,
category:aCategory.value,
images:[...uploadedImages]
});

localStorage.setItem("products",JSON.stringify(products));

uploadedImages=[];
aName.value="";
aPrice.value="";

renderAdmin();
}

/* ADMIN LIST */
function renderAdmin(){

let box=document.getElementById("adminList");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML+=`
<div class="admin-item">

<img src="${p.images?.[0]||''}" width="50">

<div style="flex:1">
<b>${p.name}</b><br>
₦${p.price}
</div>

<button class="btn" style="background:red" onclick="deleteProduct(${i})">Del</button>

</div>`;
});
}

/* DELETE */
function deleteProduct(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
renderAdmin();
}

window.onload=()=>{
showProducts("shadda",document.querySelector(".category-btn"));
}

</script>

</body>
</html>
