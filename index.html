<!DOCTYPE html>
<html>
<head>
  <title>BOB TEXTILE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  padding-top:80px;
}

/* HEADER FIXED LAYER SYSTEM */
.top-marquee{
  background:#111;
  position:fixed;
  top:0;
  width:100%;
  height:45px;
  display:flex;
  align-items:center;
  overflow:hidden;
  z-index:3000;
}

/* LOGO ABOVE TEXT */
.logo{
  height:45px;
  margin:0;
  padding:0;
  position:relative;
  z-index:5;
  background:#111;
}

/* MARQUEE GOES BEHIND LOGO */
.marquee-wrapper{
  position:absolute;
  width:100%;
  overflow:hidden;
  z-index:1;
}

.marquee-text{
  white-space:nowrap;
  animation:move 12s linear infinite;
  margin-left:120px;
  color:white;
  position:relative;
  z-index:1;
}

@keyframes move{
  0%{transform:translateX(100%);}
  100%{transform:translateX(-100%);}
}

/* ADMIN ICON ABOVE EVERYTHING */
.admin-icon{
  position:absolute;
  right:0;
  top:0;
  width:45px;
  height:45px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:10;
}

/* CATEGORY */
.category-bar{
  position:fixed;
  top:45px;
  width:100%;
  height:40px;
  background:#222;
  display:flex;
  align-items:center;
  overflow-x:auto;
  z-index:2000;
}

.category-btn{
  color:white;
  padding:0 16px;
  height:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:20px;
  margin:5px;
  cursor:pointer;
  white-space:nowrap;
}

.category-btn.active{
  background:#25D366;
}

/* VIEW */
.view{display:none;padding:10px;}
.active-view{display:block;}

/* CARD */
.card{
  background:white;
  border-radius:14px;
  padding:10px;
  margin-bottom:15px;
}

.img-wrap{
  position:relative;
  border-radius:12px;
  overflow:hidden;
}

/* NEW BADGE */
.new-badge{
  position:absolute;
  top:5px;
  left:5px;
  background:red;
  color:white;
  font-size:11px;
  padding:4px 6px;
  border-radius:5px;
  z-index:10;
}

/* CAROUSEL */
.carousel{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.carousel img{
  min-width:100%;
  height:400px;
  object-fit:contain;
  scroll-snap-align:center;
}

.carousel::-webkit-scrollbar{display:none;}

/* DOTS */
.dots{text-align:center;margin-top:5px;}
.dot{
  height:8px;width:8px;
  margin:0 3px;
  background:#bbb;
  border-radius:50%;
  display:inline-block;
}
.dot.active{background:#000;}

/* PRICE */
.price{
  background:#111;
  color:white;
  text-align:center;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

/* BUY BUTTON */
.buy-btn{
  background:#25D366;
  color:white;
  border:none;
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  cursor:pointer;
}

.buy-btn img{width:18px;}

/* ADMIN */
.admin{
  display:none;
  position:fixed;
  top:0;
  width:100%;
  height:100%;
  background:white;
  z-index:5000;
  padding:15px;
  overflow:auto;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.btn{
  width:100%;
  padding:10px;
  background:green;
  color:white;
  border:none;
  margin-top:5px;
}

.admin-item{
  display:flex;
  align-items:center;
  gap:10px;
  background:#eee;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
}

.delete-btn{background:red;color:white;border:none;padding:5px;}
.edit-btn{background:orange;color:white;border:none;padding:5px;}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top-marquee">
  <img src="logo.jpeg" class="logo">

  <div class="marquee-wrapper">
    <div class="marquee-text">
      ✨ BOB TEXTILE ✨ Premium Fashion Store ✨ Quality Fabrics ✨ Affordable Luxury ✨
    </div>
  </div>

  <div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<!-- CATEGORY -->
<div class="category-bar">
  <div class="category-btn" onclick="showView('about',this)">ABOUT</div>
  <div class="category-btn" onclick="showView('kaftan',this)">KAFTAN</div>
  <div class="category-btn" onclick="showView('lace',this)">LACE</div>
  <div class="category-btn" onclick="showView('bags',this)">BAGS</div>
  <div class="category-btn" onclick="showView('shoes',this)">SHOES</div>
  <div class="category-btn" onclick="showView('abayas',this)">ABAYAS</div>
  <div class="category-btn" onclick="showView('yard',this)">YARD</div>
  <div class="category-btn" onclick="showView('caps',this)">CAPS</div>
</div>

<!-- VIEWS -->
<div id="aboutView" class="view active-view">
  <div class="card">Welcome to BOB TEXTILE</div>
</div>

<div id="kaftanView" class="view"></div>
<div id="laceView" class="view"></div>
<div id="bagsView" class="view"></div>
<div id="shoesView" class="view"></div>
<div id="abayasView" class="view"></div>
<div id="yardView" class="view"></div>
<div id="capsView" class="view"></div>

<script>
let products=JSON.parse(localStorage.getItem("products"))||[];

function showView(type,el){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active-view"));
  document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  localStorage.setItem("activeView",type);

  if(type==="about"){
    aboutView.classList.add("active-view");
    return;
  }

  let list=products.filter(p=>p.category===type);
  let html="";

  list.forEach((p,i)=>{
    let isNew=(Date.now()-p.date)<86400000;

    html+=`
    <div class="card">

      <div class="img-wrap">
        ${isNew?'<div class="new-badge">NEW</div>':''}

        <div class="carousel car${type}${i}">
          ${p.images.map(img=>`<img src="${img}">`).join('')}
        </div>
      </div>

      <div class="dots dots${type}${i}"></div>

      <div class="price">₦ ${p.price}</div>

      <button class="buy-btn" onclick="buyNow(${i},'${type}')">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        BUY NOW
      </button>

    </div>`;
  });

  document.getElementById(type+"View").innerHTML=html;
  document.getElementById(type+"View").classList.add("active-view");

  list.forEach((p,i)=>setupCarousel(type,i));
}

/* CAROUSEL */
function setupCarousel(type,i){
  let c=document.querySelector(".car"+type+i);
  let box=document.querySelector(".dots"+type+i);
  if(!c)return;

  let imgs=c.querySelectorAll("img");
  box.innerHTML="";

  imgs.forEach((_,x)=>{
    let d=document.createElement("span");
    d.className="dot";
    if(x===0)d.classList.add("active");
    box.appendChild(d);
  });

  let dots=box.querySelectorAll(".dot");

  c.addEventListener("scroll",()=>{
    let index=Math.round(c.scrollLeft/c.clientWidth);
    dots.forEach(d=>d.classList.remove("active"));
    if(dots[index])dots[index].classList.add("active");
  });
}

/* BUY */
function buyNow(i,type){
  let list=products.filter(p=>p.category===type);
  let p=list[i];

  let car=document.querySelector(".car"+type+i);
  let imgs=car.querySelectorAll("img");
  let index=Math.round(car.scrollLeft/car.clientWidth);

  let msg=`Hello 👋
Product: ${type}
Price: ₦${p.price}
Image: ${imgs[index].src}

Is it available?`;

  window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
}

/* RESTORE ACTIVE TAB */
window.onload=()=>{
  let saved=localStorage.getItem("activeView")||"about";
  let btn=[...document.querySelectorAll(".category-btn")]
    .find(b=>b.textContent.toLowerCase().includes(saved));
  if(btn) showView(saved,btn);
};
</script>

</body>
</html>
