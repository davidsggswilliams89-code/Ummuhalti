<!DOCTYPE html>
<html>
<head>
  <title>Ummuhalti Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    /* HEADER */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111;
      color: white;
      padding: 12px 15px;
      z-index: 1000;
    }

    .header a {
      color: white;
      text-decoration: none;
      margin-left: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    .menu-icon {
      font-size: 24px;
      cursor: pointer;
    }

    .hero {
      text-align: center;
      padding: 100px 20px 40px;
      background: white;
    }

    /* CAROUSEL */
    .carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 15px;
      padding: 10px;
    }

    .carousel::-webkit-scrollbar {
      display: none;
    }

    .card {
      flex: 0 0 85%;
      scroll-snap-align: center;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .img-box img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      background: rgba(0,0,0,0.7);
      color: white;
      text-align: center;
      padding: 5px;
      font-weight: bold;
      border-radius: 5px;
      margin-top: -30px;
      position: relative;
    }

    .btn {
      background: green;
      color: white;
      padding: 10px;
      border: none;
      width: 100%;
      margin-top: 5px;
      border-radius: 5px;
    }

    .section {
      background: white;
      margin-top: 10px;
      padding: 15px;
    }

    /* DOTS */
    .dots {
      text-align: center;
      margin-top: 5px;
    }

    .dot {
      height: 8px;
      width: 8px;
      margin: 0 3px;
      background: #bbb;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.active {
      background: #111;
    }

    /* WHATSAPP */
    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: green;
      color: white;
      padding: 12px;
      border-radius: 50%;
      text-decoration: none;
    }

    /* MODAL (ZOOM PAGE) */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      width: 90%;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .modal img {
      width: 100%;
      border-radius: 10px;
    }

    /* ADMIN PANEL */
    .admin {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 3000;
      padding: 15px;
      overflow-y: auto;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>Ummuhalti</div>
  <div>
    <a href="#products">Products</a>
    <a onclick="openAdmin()">Admin</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Ummuhalti Collection</h1>
  <p>Swipe & Shop Easily</p>
</div>

<!-- PRODUCTS -->
<div class="carousel" id="productList"></div>
<div class="dots" id="dots"></div>

<!-- MODAL (ZOOM PAGE) -->
<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <img id="mImg">
    <h3 id="mName"></h3>
    <p id="mCode"></p>
    <p id="mPrice"></p>
    <button class="btn" onclick="closeModal()">Close</button>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div class="admin" id="adminPanel">
  <h2>Admin Dashboard</h2>
  <input id="aName" placeholder="Product Name">
  <input id="aCode" placeholder="Product Code">
  <input id="aPrice" placeholder="Price">
  <input type="file" id="aImage">

  <button class="btn" onclick="addProduct()">Add Product</button>
  <button class="btn" style="background:red" onclick="closeAdmin()">Close</button>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/2348012345678" class="whatsapp">💬</a>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"Kaftan Royal", code:"UMM-001", price:"₦5000", image:"kaftan.jpg"},
  {name:"Kaftan Premium", code:"UMM-002", price:"₦5500", image:"kaftan.jpg"},
  {name:"Kaftan Classic", code:"UMM-003", price:"₦6000", image:"kaftan.jpg"},
  {name:"Kaftan Luxury", code:"UMM-004", price:"₦6500", image:"kaftan.jpg"},
  {name:"Kaftan Elite", code:"UMM-005", price:"₦7000", image:"kaftan.jpg"},
  {name:"Kaftan Supreme", code:"UMM-006", price:"₦7500", image:"kaftan.jpg"}
];

let cart = [];

function display(){
  let box = document.getElementById("productList");
  let dots = document.getElementById("dots");

  box.innerHTML = "";
  dots.innerHTML = "";

  products.forEach((p,i)=>{
    box.innerHTML += `
      <div class="card">
        <div class="img-box" onclick='openModal(${i})'>
          <img src="${p.image}">
        </div>
        <div class="price">${p.price}</div>
        <h3>${p.name}</h3>
        <p>${p.code}</p>
        <button class="btn" onclick="add('${p.name}','${p.code}','${p.price}')">
          Add to Cart
        </button>
      </div>
    `;
    dots.innerHTML += `<span class="dot"></span>`;
  });

  updateDots(0);
}

function updateDots(i){
  document.querySelectorAll(".dot").forEach((d,idx)=>{
    d.classList.remove("active");
    if(idx === i) d.classList.add("active");
  });
}

/* ZOOM PAGE */
function openModal(i){
  let p = products[i];
  document.getElementById("mImg").src = p.image;
  document.getElementById("mName").innerText = p.name;
  document.getElementById("mCode").innerText = p.code;
  document.getElementById("mPrice").innerText = p.price;
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* ADMIN */
function openAdmin(){
  let pass = prompt("Enter Admin Password:");
  if(pass === "1234"){
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("Wrong password");
  }
}

function closeAdmin(){
  document.getElementById("adminPanel").style.display = "none";
}

/* ADD PRODUCT */
function addProduct(){
  let name = document.getElementById("aName").value;
  let code = document.getElementById("aCode").value;
  let price = document.getElementById("aPrice").value;
  let file = document.getElementById("aImage").files[0];

  let reader = new FileReader();
  reader.onload = function(){
    let img = reader.result;

    products.push({name, code, price, image: img});
    localStorage.setItem("products", JSON.stringify(products));

    display();
    alert("Product Added!");
    closeAdmin();
  };

  reader.readAsDataURL(file);
}

/* CART */
function add(n,c,p){
  cart.push({n,c,p});
  alert("Added");
}

display();

</script>

</body>
</html>
